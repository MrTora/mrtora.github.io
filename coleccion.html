                    <span style={{fontSize:'9px',fontWeight:800,color: b.textColor,textTransform:'uppercase',letterSpacing:'.4px'}}>
                      {b.label}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={{display:'flex',gap:'8px',marginTop:'14px',flexWrap:'wrap'}}>
          <a
            href={`https://www.cardmarket.com/es/Magic/Products/Search?searchString=${encodeURIComponent(card.name)}`}
            target="_blank" rel="noopener noreferrer"
            style={{
              display:'inline-flex',alignItems:'center',gap:'5px',
              padding:'8px 12px',borderRadius:'7px',fontSize:'12px',fontWeight:700,
              background:'#1a6e3c',color:'#fff',textDecoration:'none',
              border:'1px solid #2a9e5c',
            }}
          >
            🔗 Cardmarket
          </a>
          <button className="btn btn-secondary" style={{flex:1}} onClick={()=>onChangeCount(-1)}>− Quitar copia</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={()=>onChangeCount(+1)}>+ Agregar copia</button>
        </div>
      </div>
    </div>
  );
}

/* ─── FOLDER VIEW (inner collection display) ─── */
function FolderView({ collection, setCollection, showToast }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [printingTarget, setPrintingTarget] = useState(null);
  const [eurClpRate, setEurClpRate] = useState(null);

  useEffect(() => {
    fetch('https://api.frankfurter.app/latest?from=EUR&to=CLP')
      .then(r => r.json())
      .then(d => { if (d?.rates?.CLP) setEurClpRate(d.rates.CLP); })
      .catch(() => setEurClpRate(1150)); // fallback aproximado
  }, []);
  const [detailCard, setDetailCard] = useState(null);
  const [fColors, setFColors] = useState([]);
  const [fTypes, setFTypes] = useState([]);
  const [fFoil, setFFoil] = useState('all');
  const [fRarity, setFRarity] = useState([]);
  const [collSearch, setCollSearch] = useState('');
  const [sortBy, setSortBy] = useState('name-asc');
  const timer = useRef();

  const search = useCallback(async q => {
    if (!q || q.length < 2) { setResults([]); return; }
    setLoading(true);
    try {
      const r = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(q)}&order=name&unique=cards`);
      const d = await r.json();
      setResults((d.data || []).slice(0, 12));
    } catch { setResults([]); } finally { setLoading(false); }
  }, []);

  const handleQuery = e => {
    setQuery(e.target.value);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => search(e.target.value), 400);
  };

  const handleSearchClick = sc => { setPrintingTarget(sc.name); setQuery(''); setResults([]); };

  const addFromModal = entry => {
    const ex = collection.find(c => c.uid === entry.uid);
    if (ex) {
      const newCount = ex.count + entry.count;
      setCollection(collection.map(c => c.uid === entry.uid ? {...c, count: newCount} : c));
      showToast(`+${entry.count} ${entry.name} ${entry.isFoil ? '✨' : ''} (${newCount} total)`);
    } else {
      setCollection([...collection, entry]);
      showToast(`✅ ${entry.name}${entry.isFoil ? ' ✨ Foil' : ''}${entry.count > 1 ? ` ×${entry.count}` : ''} — ${entry.setName} añadida`);
    }
  };

  const changeCount = (uid, d) => setCollection(collection.map(c => {
    if (c.uid !== uid) return c;
    return c.count + d <= 0 ? null : {...c, count: c.count+d};
  }).filter(Boolean));

  const updatePrice = (uid, priceEur, priceFoilEur) => {
    setCollection(collection.map(c => c.uid !== uid ? c : {
      ...c,
      priceEur:     priceEur     !== '' ? priceEur     : c.priceEur,
      priceFoilEur: priceFoilEur !== '' ? priceFoilEur : c.priceFoilEur,
    }));
  };

  const remove = uid => { setCollection(collection.filter(c => c.uid !== uid)); showToast('Carta eliminada'); };

  // ── Actualizar precios ──
  const [refreshingPrices, setRefreshingPrices] = useState(false);
  const [refreshProgress, setRefreshProgress] = useState({ done: 0, total: 0 });

  const refreshPrices = async () => {
    if (refreshingPrices || collection.length === 0) return;
    setRefreshingPrices(true);
    setRefreshProgress({ done: 0, total: collection.length });
    const updated = collection.map(c => ({ ...c }));
    for (let i = 0; i < updated.length; i++) {
      const card = updated[i];
      if (card.setCode && card.collectorNumber) {
        try {
          const slim = await fetchCardCached(card.setCode, card.collectorNumber, true);
          if (slim) {
            updated[i] = {
              ...card,
              priceEur:     slim.priceEur     !== undefined ? slim.priceEur     : card.priceEur,
              priceFoilEur: slim.priceFoilEur !== undefined ? slim.priceFoilEur : card.priceFoilEur,
            };
          }
        } catch {}
        await new Promise(res => setTimeout(res, 80));
      }
      setRefreshProgress({ done: i + 1, total: updated.length });
    }
    setCollection(updated);
    setRefreshingPrices(false);
    showToast(`💰 Precios actualizados — ${updated.length} cartas`);
  };

  const exportCSV = () => {
    const headers = ['Nombre','Edición','Set','Número','Año','Foil','Precio Normal (€)','Precio Foil (€)','Copias','Valor (€)'];
    const rows = collection.map(c => [
      c.name, c.setName||'', c.setCode||'', c.collectorNumber||'',
      c.releasedAt?.slice(0,4)||'', c.isFoil?'Sí':'No',
      c.priceEur?parseFloat(c.priceEur).toFixed(2):'',
      c.priceFoilEur?parseFloat(c.priceFoilEur).toFixed(2):'',
      c.count, (cardPrice(c)*c.count).toFixed(2),
    ]);
    const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mtg-coleccion-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast(`📊 CSV exportado (${collection.length} cartas)`);
  };

  /* ── Filter & sort ── */
  const toggleColor  = id => setFColors(prev =>  prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  const toggleType   = id => setFTypes(prev =>   prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  const toggleRarity = id => setFRarity(prev =>  prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  const clearAll = () => { setFColors([]); setFTypes([]); setFFoil('all'); setFRarity([]); setCollSearch(''); setSortBy('name-asc'); };
  const hasFilters = fColors.length > 0 || fTypes.length > 0 || fFoil !== 'all' || fRarity.length > 0 || collSearch.trim() !== '';

  const displayed = collection
    .filter(c => {
      // name search within collection
      if (collSearch.trim()) {
        if (!c.name.toLowerCase().includes(collSearch.trim().toLowerCase())) return false;
      }
      // foil filter
      if (fFoil === 'foil'   && !c.isFoil) return false;
      if (fFoil === 'normal' &&  c.isFoil) return false;
      // color filter
      if (fColors.length > 0) {
        const cols = cardColors(c);
        const isMulti = cols.length > 1;
        const isColorless = cols.length === 0;
        const matches = fColors.some(fc => {
          if (fc === 'M') return isMulti;
          if (fc === 'C') return isColorless;
          return cols.includes(fc);
        });
        if (!matches) return false;
      }
      // type filter
      if (fTypes.length > 0) {
        if (!fTypes.includes(cardMainType(c.typeLine))) return false;
      }
      // rarity filter
      if (fRarity.length > 0) {
        if (!fRarity.includes(c.rarity)) return false;
      }
      return true;
    })
    .sort((a, b) => {
      if (sortBy === 'name-asc')   return a.name.localeCompare(b.name);
      if (sortBy === 'name-desc')  return b.name.localeCompare(a.name);
      if (sortBy === 'value-desc') return cardPrice(b) - cardPrice(a);
      if (sortBy === 'value-asc')  return cardPrice(a) - cardPrice(b);
      if (sortBy === 'count-desc') return b.count - a.count;
      if (sortBy === 'set-asc')    return (a.setName||'').localeCompare(b.setName||'');
      if (sortBy === 'added-desc') return collection.indexOf(b) - collection.indexOf(a);
      return 0;
    });

  const totalCopies = collection.reduce((a,c) => a+c.count, 0);
  const totalValue  = collection.reduce((a,c) => a + cardPrice(c) * c.count, 0);
  const fallbackImg = () => `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='196'><rect width='140' height='196' rx='8' fill='%23333'/><text x='70' y='98' text-anchor='middle' fill='%23888' font-size='11'>Sin imagen</text></svg>`;

  return (
    <div>
      {/* Stats */}
      <div className="stats-bar">
        <div className="stat-item"><span className="stat-value">{collection.length}</span><span className="stat-label">Entradas</span></div>
        <div className="stat-item"><span className="stat-value">{totalCopies}</span><span className="stat-label">Copias totales</span></div>
        <div className="stat-item">
          <span className="stat-value">€{totalValue.toFixed(2)}</span>
          {eurClpRate && <span className="stat-value" style={{fontSize:'13px',color:'var(--text2)',marginLeft:'6px'}}>/ ${Math.round(totalValue * eurClpRate).toLocaleString('es-CL')} CLP</span>}
          <span className="stat-label">Valor total</span>
        </div>
        {collection.length > 0 && (
          <div style={{marginLeft:'auto',display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
            {refreshingPrices ? (
              <div style={{display:'flex',alignItems:'center',gap:'7px',fontSize:'12px',color:'var(--text2)'}}>
                <div className="spinner"/>
                <span>{refreshProgress.done}/{refreshProgress.total} actualizando…</span>
              </div>
            ) : (
              <button
                onClick={refreshPrices}
                title={`Actualizar precios desde Scryfall · ${cardCacheSize()} cartas en caché`}
                style={{
                  fontSize:'12px',padding:'6px 12px',borderRadius:'7px',
                  background:'transparent',border:'1px solid var(--border)',
                  color:'var(--text2)',cursor:'pointer',transition:'all .12s',fontFamily:'inherit',
                }}
              >
                🔄 Actualizar precios
              </button>
            )}
            <button className="btn btn-secondary" style={{fontSize:'12px',padding:'6px 12px'}} onClick={exportCSV}>📊 CSV</button>
          </div>
        )}
      </div>

      {/* Search */}
      <div>
        <div className="search-bar-row">
          <input className="search-input" value={query} onChange={handleQuery} placeholder="🔍 Buscar carta para añadir…" />
          {loading && <div className="spinner" />}
        </div>
        {results.length > 0 && (
          <div className="search-results">
            {results.map(c => (
              <div key={c.id} className="search-result-item" onClick={() => handleSearchClick(c)}>
                <img className="search-result-img"
                  src={c.image_uris?.small || c.card_faces?.[0]?.image_uris?.small || ''}
                  alt={c.name} onError={e=>{e.target.style.display='none';}} />
                <div className="search-result-info">
                  <div className="search-result-name">{c.name}</div>
                  <div className="search-result-type">{c.type_line}</div>
                </div>
                <ManaCost cost={c.mana_cost} size={12} />
                <span style={{color:'var(--accent2)',fontSize:'18px',marginLeft:'8px'}}>→</span>
              </div>
            ))}
          </div>
        )}
        {query.length >= 2 && !loading && !results.length && (
          <div style={{marginTop:'8px',color:'var(--text2)',fontSize:'13px'}}>Sin resultados para "{query}"</div>
        )}
      </div>

      {/* ── Filter / Sort bar (only when collection has cards) ── */}
      {collection.length > 0 && (
        <div className="filter-bar">
          {/* Row 0: Search within collection */}
          <div className="filter-row">
            <span className="filter-label">Buscar</span>
            <input
              className="search-input"
              style={{maxWidth:'280px',padding:'6px 12px',fontSize:'13px'}}
              value={collSearch}
              onChange={e => setCollSearch(e.target.value)}
              placeholder="🔍 Filtrar por nombre…"
            />
            {hasFilters && (
              <button className="filter-clear" onClick={clearAll}>✕ Limpiar todo</button>
            )}
          </div>

          {/* Row 1: Colors + Foil */}
          <div className="filter-row">
            <span className="filter-label">Color</span>
            {COLOR_OPTIONS.map(co => (
              <button key={co.id} className={`color-chip${fColors.includes(co.id)?' active':''}`}
                style={{background: co.bg}} title={co.label}
                onClick={() => toggleColor(co.id)}>
                {co.emoji}
              </button>
            ))}
            <div style={{width:'1px',height:'22px',background:'var(--border)',margin:'0 4px'}} />
            <span className="filter-label" style={{minWidth:'auto'}}>Foil</span>
            {[['all','Todos'],['foil','✨ Foil'],['normal','Normal']].map(([val,lbl]) => (
              <button key={val} className={`chip foil-chip${fFoil===val?' active':''}`}
                onClick={() => setFFoil(val)}>{lbl}</button>
            ))}
          </div>

          {/* Row 2: Rarity */}
          <div className="filter-row">
            <span className="filter-label">Rareza</span>
            {RARITY_OPTIONS.map(ro => (
              <button key={ro.id}
                className={`chip${fRarity.includes(ro.id)?' active':''}`}
                style={fRarity.includes(ro.id) ? {borderColor: ro.color, background: ro.color+'22', color: ro.color} : {}}
                onClick={() => toggleRarity(ro.id)}>
                <span style={{color: fRarity.includes(ro.id) ? ro.color : ro.color, marginRight:'3px'}}>{ro.sym}</span>
                {ro.label}
              </button>
            ))}
          </div>

          {/* Row 3: Types + Sort */}
          <div className="filter-row">
            <span className="filter-label">Tipo</span>
            {TYPE_OPTIONS.map(to => (
              <button key={to.id} className={`chip${fTypes.includes(to.id)?' active':''}`}
                onClick={() => toggleType(to.id)}>{to.label}</button>
            ))}
            <div style={{width:'1px',height:'22px',background:'var(--border)',margin:'0 4px'}} />
            <span className="filter-label" style={{minWidth:'auto'}}>Orden</span>
            <select className="sort-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              {SORT_OPTIONS.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
            <span className="filter-count">
              {displayed.length === collection.length
                ? `${collection.length} cartas`
                : `${displayed.length} / ${collection.length} cartas`}
            </span>
          </div>
        </div>
      )}

      {/* Grid */}
      {collection.length === 0 ? (
        <div className="empty-state">
          <div className="icon">🃏</div>
          <h3>Esta carpeta está vacía</h3>
          <p>Busca cartas arriba y elige edición + foil</p>
        </div>
      ) : displayed.length === 0 ? (
        <div className="empty-state">
          <div className="icon">🔍</div>
          <h3>Sin resultados</h3>
          <p>Ninguna carta coincide con los filtros activos</p>
        </div>
      ) : (
        <div className="collection-grid">
          {displayed.map(c => {
            const price = c.isFoil
              ? (c.priceFoilEur ? `€${parseFloat(c.priceFoilEur).toFixed(2)}` : '—')
              : (c.priceEur ? `€${parseFloat(c.priceEur).toFixed(2)}` : '—');
            return (
              <div key={c.uid} className="coll-card">
                {/* Image wrapper with relative positioning for badges */}
                <div style={{position:'relative'}}>
                  <FoilCardImage
                    src={c.imgS || c.img}
                    alt={c.name}
                    isFoil={c.isFoil}
                    onClick={() => setDetailCard(c)}
                    onError={e => { e.target.src = fallbackImg(c.uid); }}
                  />
                  {c.isFoil && <div className="foil-badge">✨ FOIL</div>}
                  {c.setCode && <div className="set-badge">{c.setCode}</div>}
                  <div className={`price-badge${c.isFoil?' foil-price':''}`}>{price}</div>
                </div>
                <div className="coll-name">{c.name}</div>
                <div className="coll-meta">×{c.count}{c.setName ? ` · ${c.setName.length > 18 ? c.setName.slice(0,16)+'…' : c.setName}` : ''}</div>
                <div className="coll-actions">
                  <button className="icon-btn" onClick={()=>changeCount(c.uid,-1)}>−</button>
                  <button className="icon-btn" onClick={()=>changeCount(c.uid,+1)}>＋</button>
                  <button className="icon-btn" onClick={()=>remove(c.uid)} style={{color:'var(--danger)'}}>🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Printing modal */}
      {printingTarget && (
        <PrintingModal cardName={printingTarget} onClose={()=>setPrintingTarget(null)} onAdd={addFromModal} />
      )}

      {/* Detail modal */}
      {detailCard && (
        <DetailModal
          card={detailCard}
          onClose={()=>setDetailCard(null)}
          onChangeCount={(d)=>{changeCount(detailCard.uid,d);setDetailCard(null);}}
          onUpdatePrice={(n,f)=>{updatePrice(detailCard.uid,n,f);showToast('💰 Precio actualizado');}}
        />
      )}
    </div>
  );
}

/* ─── IMPORT DECK MODAL ─── */
function ImportDeckModal({ onClose, onImport }) {
  const [step, setStep] = useState(1);
  const [deckText, setDeckText] = useState('');
  const [deckName, setDeckName] = useState('');
  const [parsed, setParsed] = useState([]);
  const [error, setError] = useState('');

  const parseText = () => {
    const lines = deckText.trim().split('\n');
    const entries = [];
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || trimmed === 'Deck' || trimmed === 'Sideboard') continue;
      const m = trimmed.match(/^(\d+)\s+(.+?)\s+\(([A-Za-z0-9]+)\)\s+(\d+\w*)$/);
      if (m) entries.push({ qty: parseInt(m[1]), name: m[2].trim(), set: m[3].toUpperCase(), number: m[4] });
    }
    if (entries.length === 0) { setError('No se encontraron cartas válidas. Revisa el formato.'); return; }
    setParsed(entries);
    setError('');
    setStep(2);
  };

  const confirm = () => {
    if (!deckName.trim()) return;
    onImport({ id: `deck-${Date.now()}`, name: deckName.trim(), entries: parsed });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'560px'}} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h3>🃏 Importar Deck</h3>
          <button className="icon-btn" onClick={onClose}>✕</button>
        </div>
        {step === 1 ? (
          <>
            <p style={{fontSize:'13px',color:'var(--text2)',marginBottom:'12px',lineHeight:'1.5'}}>
              Pega la lista en formato MTGA. Cada línea: <code style={{color:'var(--accent)',background:'var(--surface2)',padding:'1px 5px',borderRadius:'4px'}}>4 Goblin Surprise (FDN) 200</code>
            </p>
            <textarea
              autoFocus
              value={deckText}
              onChange={e => setDeckText(e.target.value)}
              placeholder={"Deck\n4 Goblin Surprise (FDN) 200\n2 Mountain (ANB) 114\n1 Krenko, Mob Boss (FDN) 204\n..."}
              style={{
                width:'100%', minHeight:'280px', background:'var(--surface2)', border:'1px solid var(--border)',
                borderRadius:'8px', padding:'12px', color:'var(--text)', fontSize:'13px', lineHeight:'1.6',
                resize:'vertical', fontFamily:'monospace', display:'block',
              }}
            />
            {error && <p style={{color:'var(--danger)',fontSize:'13px',marginTop:'8px'}}>{error}</p>}
            <div style={{display:'flex',gap:'8px',marginTop:'14px',justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={parseText} disabled={!deckText.trim()}>Siguiente →</button>
            </div>
          </>
        ) : (
          <>
            <p style={{fontSize:'13px',color:'var(--text2)',marginBottom:'12px',lineHeight:'1.5'}}>
              Se encontraron <strong style={{color:'var(--text)'}}>{parsed.length} cartas distintas</strong> ({parsed.reduce((s,e)=>s+e.qty,0)} copias en total). ¿Cómo se llama este deck?
            </p>
            <input
              autoFocus
              value={deckName}
              onChange={e => setDeckName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') confirm(); }}
              placeholder="Nombre del deck…"
              style={{
                width:'100%', background:'var(--surface2)', border:'1px solid var(--border)',
                borderRadius:'8px', padding:'10px 14px', color:'var(--text)', fontSize:'15px',
                marginBottom:'14px', display:'block',
              }}
            />
            <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={() => setStep(1)}>← Atrás</button>
              <button className="btn btn-primary" onClick={confirm} disabled={!deckName.trim()}>✅ Crear Deck</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── DECK VIEW ─── */
function DeckView({ deck, allCollectionCards, onReplaceEntry, onDeleteDeck, showToast }) {
  const [cardData, setCardData] = useState({});
  const [loadingCards, setLoadingCards] = useState(true);
  const [loadProgress, setLoadProgress] = useState({ done: 0, total: 0, fromCache: 0 });
  const [refreshKey, setRefreshKey] = useState(0);
  const forceRefreshRef = useRef(false);
  const [replacingEntry, setReplacingEntry] = useState(null);


  useEffect(() => {
    let cancelled = false;
    const doForce = forceRefreshRef.current;
    forceRefreshRef.current = false;

    async function fetchAll() {
      setLoadingCards(true);
      setLoadProgress({ done: 0, total: deck.entries.length, fromCache: 0 });
      const data = {};
      let fromCache = 0;

      for (let i = 0; i < deck.entries.length; i++) {
        if (cancelled) break;
        const entry = deck.entries[i];
        try {
          const slim = await fetchCardCached(entry.set, entry.number, doForce);
          if (slim) {
            data[entry.name] = {
              img:        slim.imgSmall,
              imgNormal:  slim.imgNormal,
              typeLine:   slim.typeLine,
              manaCost:   slim.manaCost,
              cmc:        slim.cmc,
              priceEur:   slim.priceEur,
              legalities: slim.legalities || {},
            };
            if (slim._fromCache) {
              fromCache++;
            } else {
              // Solo throttle cuando va a la red (respeta rate limit de Scryfall)
              await new Promise(res => setTimeout(res, 80));
            }
          }
        } catch {}
        setLoadProgress({ done: i + 1, total: deck.entries.length, fromCache });
      }
      if (!cancelled) { setCardData(data); setLoadingCards(false); }
    }
    fetchAll();
    return () => { cancelled = true; };
  }, [deck.id, refreshKey]);

  const handleRefreshPrices = () => {
    forceRefreshRef.current = true;
    setRefreshKey(k => k + 1);
  };

  // Retorna { count, displayCard, hasDifferentEdition }
  // Maneja cartas de doble cara: "Foo // Bar" en colección vs "Foo" en deck (y viceversa)
  const getOwnedInfo = entry => {
    const norm = s => s.trim().toLowerCase();
    const deckName = norm(entry.name);
    const matches = allCollectionCards.filter(c => {
      const colName = norm(c.name);
      return colName === deckName
        || colName.startsWith(deckName + ' //')   // colección: "Foo // Bar", deck: "Foo"
        || deckName.startsWith(colName + ' //');  // colección: "Foo", deck: "Foo // Bar"
    });
    const totalOwned = matches.reduce((sum, c) => sum + c.count, 0);
    const exactMatch = matches.find(c =>
      c.setCode?.toLowerCase() === entry.set?.toLowerCase()
    );
    const displayCard = exactMatch || matches[0] || null;
    const hasDifferentEdition = !!(displayCard && !exactMatch);
    return { count: totalOwned, displayCard, hasDifferentEdition };
  };
  const getOwned = name => getOwnedInfo({ name, set: '' }).count;

  // Exportar deck en formato MTGA
  const exportDeck = () => {
    const lines = ['Deck', ...deck.entries.map(e => `${e.qty} ${e.name} (${e.set}) ${e.number}`)];
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${deck.name.replace(/\s+/g, '-').toLowerCase()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const getType = entry => {
    const tl = (cardData[entry.name]?.typeLine || '').toLowerCase();
    if (tl.includes('creature'))     return 'creature';
    if (tl.includes('planeswalker')) return 'planeswalker';
    if (tl.includes('instant'))      return 'instant';
    if (tl.includes('sorcery'))      return 'sorcery';
    if (tl.includes('enchantment'))  return 'enchantment';
    if (tl.includes('artifact'))     return 'artifact';
    if (tl.includes('land'))         return 'land';
    return 'other';
  };

  const TYPE_ORDER = [
    { key: 'creature',     label: '🦎 Criaturas' },
    { key: 'planeswalker', label: '✨ Planeswalkers' },
    { key: 'instant',      label: '⚡ Instantáneos' },
    { key: 'sorcery',      label: '🌀 Conjuros' },
    { key: 'enchantment',  label: '🔮 Encantamientos' },
    { key: 'artifact',     label: '⚙️ Artefactos' },
    { key: 'land',         label: '🏔️ Tierras' },
    { key: 'other',        label: '❓ Otros' },
  ];

  const grouped = {};
  for (const g of TYPE_ORDER) grouped[g.key] = [];
  for (const entry of deck.entries) grouped[getType(entry)].push(entry);

  const totalNeeded  = deck.entries.reduce((s, e) => s + e.qty, 0);
  const totalOwned   = deck.entries.reduce((s, e) => s + Math.min(e.qty, getOwnedInfo(e).count), 0);
  const uniqueNeeded = deck.entries.length;
  const uniqueOwned  = deck.entries.filter(e => getOwnedInfo(e).count >= e.qty).length;
  const pct = totalNeeded > 0 ? Math.round(totalOwned / totalNeeded * 100) : 0;
  const pctColor = pct === 100 ? '#4ade80' : pct >= 50 ? 'var(--accent)' : 'var(--danger)';

  // Total value of deck (sum price × qty for all entries)
  const totalValue = !loadingCards
    ? deck.entries.reduce((sum, e) => sum + parseFloat(cardData[e.name]?.priceEur || 0) * e.qty, 0)
    : null;

  // Average CMC (exclude lands)
  const avgCmc = !loadingCards ? (() => {
    const nonLands = deck.entries.filter(e => !(cardData[e.name]?.typeLine||'').toLowerCase().includes('land'));
    const totalCmc = nonLands.reduce((s, e) => s + (cardData[e.name]?.cmc || 0) * e.qty, 0);
    const totalQty = nonLands.reduce((s, e) => s + e.qty, 0);
    return totalQty > 0 ? (totalCmc / totalQty).toFixed(2) : '—';
  })() : null;

  // Color distribution (count colored pips from mana costs)
  const COLOR_PIPS = ['W','U','B','R','G'];
  const COLOR_META = {
    W: { label:'Blanco', dot:'#f5f0cc', border:'#c8b86a', bg:'rgba(245,240,180,.13)' },
    U: { label:'Azul',   dot:'#5599ee', border:'#3366cc', bg:'rgba(68,136,220,.13)' },
    B: { label:'Negro',  dot:'#aa77dd', border:'#7744aa', bg:'rgba(140,80,200,.13)' },
    R: { label:'Rojo',   dot:'#ee5555', border:'#cc2222', bg:'rgba(220,68,68,.13)' },
    G: { label:'Verde',  dot:'#44cc66', border:'#228844', bg:'rgba(68,187,100,.13)' },
  };
  const colorDist = !loadingCards ? (() => {
    const counts = { W:0, U:0, B:0, R:0, G:0 };
    for (const entry of deck.entries) {
      const mc = cardData[entry.name]?.manaCost || '';
      for (const c of COLOR_PIPS) {
        const hits = (mc.match(new RegExp(`\\{${c}\\}`, 'g')) || []).length;
        counts[c] += hits * entry.qty;
      }
    }
    return counts;
  })() : null;

  // Mana curve (exclude lands, cap at 7+)
  const manaCurve = {};
  for (const entry of deck.entries) {
    const tl = (cardData[entry.name]?.typeLine || '').toLowerCase();
    if (tl.includes('land')) continue;
    const cmc = Math.min(Math.floor(cardData[entry.name]?.cmc || 0), 7);
    manaCurve[cmc] = (manaCurve[cmc] || 0) + entry.qty;
  }
  const maxCurveCount = Math.max(1, ...Object.values(manaCurve));

  // ── Legalidad del deck por formato ──
  // Un formato es legal para el deck si TODAS las cartas tienen status 'legal' o 'restricted'
  // Un formato es ilegal si alguna carta tiene 'banned' o 'not_legal'
  const deckFormats = useMemo(() => {
    if (loadingCards || deck.entries.length === 0) return null;
    // Verificar que todas las cartas tengan datos de legalidad cargados
    const hasAllData = deck.entries.every(e => cardData[e.name]?.legalities);
    if (!hasAllData) return null;

    const result = {};
    for (const [fmt] of FORMAT_ORDER) {
      let worst = 'legal'; // legal → restricted → not_legal → banned
      for (const entry of deck.entries) {
        const status = cardData[entry.name]?.legalities?.[fmt] || 'not_legal';
        if (status === 'banned')     { worst = 'banned'; break; }
        if (status === 'not_legal')  { worst = 'not_legal'; continue; }
        if (status === 'restricted') {
          // En Vintage, restricted = max 1 copia
          if (entry.qty > 1) { worst = 'not_legal'; continue; }
          if (worst === 'legal') worst = 'restricted';
        }
      }
      result[fmt] = worst;
    }
    return result;
  }, [cardData, loadingCards, deck.entries]);

  const fallbackImg = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='50'><rect width='36' height='50' rx='3' fill='%23333'/><text x='18' y='28' text-anchor='middle' fill='%23666' font-size='9'>?</text></svg>`;

  // ── Hover preview ──
  const [hoverPreview, setHoverPreview] = useState(null); // { img, name, y }
  const showCardPreview = (e, name) => {
    const d = cardData[name];
    if (!d) return;
    setHoverPreview({
      img: d.imgNormal || d.img || '',
      name,
      mc: d.manaCost || '',
      typeLine: d.typeLine || '',
      priceEur: d.priceEur || null,
    });
  };
  const hideCardPreview = () => setHoverPreview(null);

  // ── Shopping list ──
  const [showShoppingList, setShowShoppingList] = useState(false);

  // ── Random Hand ──
  const [showHand, setShowHand] = useState(false);
  const [randomHand, setRandomHand] = useState([]);
  const drawHand = () => {
    const pool = [];
    for (const entry of deck.entries) {
      for (let i = 0; i < entry.qty; i++) pool.push(entry.name);
    }
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    setRandomHand(pool.slice(0, 7));
    setShowHand(true);
  };

  return (
    <div style={{display:'flex',gap:'20px',alignItems:'flex-start'}}>

      {/* ── Columna izquierda: preview sticky ── */}
      <div style={{width:'220px',flexShrink:0,position:'sticky',top:'88px'}}>
        <div style={{
          borderRadius:'12px',overflow:'hidden',
          background:'var(--surface)',border:'1px solid var(--border)',
          minHeight:'307px',display:'flex',flexDirection:'column',
          boxShadow: hoverPreview ? '0 8px 32px rgba(0,0,0,.6)' : 'none',
          transition:'box-shadow .25s',
        }}>
          {hoverPreview ? (
            <>
              <img src={hoverPreview.img} alt={hoverPreview.name}
                style={{width:'100%',display:'block'}}
                onError={e=>{e.target.style.display='none';}} />
              <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:'5px'}}>
                <div style={{fontWeight:700,fontSize:'13px',lineHeight:1.3}}>{hoverPreview.name}</div>
                {hoverPreview.mc && <ManaCost cost={hoverPreview.mc} size={13} />}
                {hoverPreview.typeLine && (
                  <div style={{fontSize:'11px',color:'var(--text2)',lineHeight:1.3}}>{hoverPreview.typeLine}</div>
                )}
                {hoverPreview.priceEur && (
                  <div style={{fontSize:'13px',fontWeight:700,color:'var(--accent)',marginTop:'2px'}}>
                    €{parseFloat(hoverPreview.priceEur).toFixed(2)}
                  </div>
                )}
              </div>
            </>
          ) : (
            <div style={{
              flex:1,display:'flex',flexDirection:'column',alignItems:'center',
              justifyContent:'center',gap:'10px',color:'var(--text2)',
              padding:'24px 16px',textAlign:'center',
            }}>
              <span style={{fontSize:'40px',opacity:.35}}>🃏</span>
              <span style={{fontSize:'11px',lineHeight:1.6,opacity:.6}}>
                Pasa el mouse sobre una carta para previsualizar
              </span>
            </div>
          )}
        </div>
      </div>

      {/* ── Columna derecha: contenido ── */}
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:'16px'}}>

      {/* ── Panel de legalidad del deck por formato ── */}
      <div style={{
        background:'var(--surface)', border:'1px solid var(--border)',
        borderRadius:'12px', padding:'14px 16px',
      }}>
        <div style={{
          fontSize:'10px', fontWeight:700, color:'var(--text2)',
          textTransform:'uppercase', letterSpacing:'.6px', marginBottom:'10px',
          fontFamily:"'Cinzel Decorative','Palatino Linotype',serif",
          display:'flex', alignItems:'center', gap:'8px',
        }}>
          <span>⚖️ Legalidad del mazo por formato</span>
          {!loadingCards && deckFormats && (() => {
            const legalCount = Object.values(deckFormats).filter(s => s === 'legal' || s === 'restricted').length;
            return (
              <span style={{fontFamily:'inherit',fontSize:'10px',color:'var(--text2)',marginLeft:'auto',fontWeight:400}}>
                <span style={{color:'#7ef5a8',fontWeight:700}}>{legalCount}</span> legales ·{' '}
                <span style={{color:'rgba(255,255,255,.3)',fontWeight:400}}>{FORMAT_ORDER.length - legalCount}</span> no legales
              </span>
            );
          })()}
        </div>

        {loadingCards ? (
          <div style={{display:'flex',alignItems:'center',gap:'8px',color:'var(--text2)',fontSize:'12px',padding:'4px 0'}}>
            <div className="spinner" style={{width:'13px',height:'13px'}}/>
            <span>Cargando datos de legalidad…</span>
          </div>
        ) : !deckFormats ? (
          <div style={{fontSize:'12px',color:'var(--text2)',padding:'4px 0'}}>Sin datos de legalidad disponibles aún.</div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:'3px'}}>
            {FORMAT_ORDER.map(([key, label]) => {
              const status = deckFormats[key] || 'not_legal';
              const b = LEGALITY_BADGE[status] || LEGALITY_BADGE.not_legal;
              const isOk = status === 'legal' || status === 'restricted';
              // Verificar qué carta(s) causan el problema
              const offenders = !isOk
                ? deck.entries
                    .filter(e => {
                      const s = cardData[e.name]?.legalities?.[key];
                      return s === 'banned' || s === 'not_legal';
                    })
                    .slice(0, 3)
                    .map(e => e.name)
                : [];
              return (
                <div key={key}
                  title={offenders.length ? `No legal por: ${offenders.join(', ')}${offenders.length < deck.entries.filter(e => ['banned','not_legal'].includes(cardData[e.name]?.legalities?.[key])).length ? '…' : ''}` : label}
                  style={{
                    display:'flex', alignItems:'center', justifyContent:'space-between',
                    padding:'4px 8px', borderRadius:'5px',
                    background: b.bg,
                    border:`1px solid ${b.border}`,
                    opacity: !isOk ? 0.45 : 1,
                    cursor: offenders.length ? 'help' : 'default',
                    transition:'opacity .15s',
                  }}>
                  <span style={{fontSize:'10px', fontWeight:600, color: isOk ? '#e8e8f0' : 'var(--text2)', letterSpacing:'.2px'}}>
                    {label}
                  </span>
                  <span style={{fontSize:'9px', fontWeight:800, color: b.textColor, textTransform:'uppercase', letterSpacing:'.3px', marginLeft:'4px'}}>
                    {b.label}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Completion stats + value */}
      <div className="stats-bar" style={{flexDirection:'column',gap:'12px'}}>
        <div style={{display:'flex',gap:'24px',flexWrap:'wrap',alignItems:'center'}}>
          <div className="stat-item">
            <span className="stat-value" style={{fontSize:'28px',color:pctColor}}>{pct}%</span>
            <span className="stat-label">Completitud del mazo</span>
          </div>
          <div className="stat-item">
            <span className="stat-value">{totalOwned}/{totalNeeded}</span>
            <span className="stat-label">Copias disponibles</span>
          </div>
          <div className="stat-item">
            <span className="stat-value">{uniqueOwned}/{uniqueNeeded}</span>
            <span className="stat-label">Cartas completas</span>
          </div>
          <div className="stat-item">
            {totalValue !== null
              ? <span className="stat-value" style={{color:'#4ade80'}}>€{totalValue.toFixed(2)}</span>
              : <span className="stat-value" style={{color:'var(--text2)',fontSize:'16px'}}>…</span>
            }
            <span className="stat-label">Valor total del deck</span>
          </div>
          <div className="stat-item">
            {avgCmc !== null
              ? <span className="stat-value" style={{color:'var(--accent)'}}>{avgCmc}</span>
              : <span className="stat-value" style={{color:'var(--text2)',fontSize:'16px'}}>…</span>
            }
            <span className="stat-label">CMC promedio</span>
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            {loadingCards ? (
              <div style={{display:'flex',alignItems:'center',gap:'8px',color:'var(--text2)',fontSize:'12px'}}>
                <div className="spinner"/>
                <span>
                  {loadProgress.fromCache > 0
                    ? `${loadProgress.done}/${loadProgress.total} · 💾 ${loadProgress.fromCache} en caché`
                    : `Cargando ${loadProgress.done}/${loadProgress.total}…`
                  }
                </span>
              </div>
            ) : (
              <button
                onClick={handleRefreshPrices}
                title={`Actualizar precios · ${cardCacheSize()} cartas en caché`}
                style={{
                  fontSize:'11px',padding:'5px 10px',borderRadius:'6px',
                  background:'transparent',border:'1px solid var(--border)',
                  color:'var(--text2)',cursor:'pointer',transition:'all .12s',
                }}
              >
                🔄 Actualizar precios
              </button>
            )}
            <button
              className="btn btn-secondary"
              style={{fontSize:'13px',padding:'8px 16px',borderColor:'var(--accent2)',color:'var(--accent2)'}}
              onClick={drawHand}
              disabled={deck.entries.length === 0 || loadingCards}
            >
              🎲 Mano aleatoria
            </button>
            <button
              className="btn btn-secondary"
              style={{fontSize:'13px',padding:'8px 16px'}}
              onClick={exportDeck}
              title="Exportar en formato MTGA"
            >
              📤 Exportar
            </button>
            {!loadingCards && deck.entries.some(e => getOwnedInfo(e).count < e.qty) && (
              <button
                className="btn btn-secondary"
                style={{fontSize:'13px',padding:'8px 16px',borderColor:'#f97316',color: showShoppingList ? '#fff' : '#f97316', background: showShoppingList ? '#f97316' : 'transparent'}}
                onClick={() => setShowShoppingList(s => !s)}
              >
                🛒 {showShoppingList ? 'Ocultar' : `Faltantes (${deck.entries.filter(e => getOwnedInfo(e).count < e.qty).length})`}
              </button>
            )}
            {onDeleteDeck && (
              <button
                className="btn btn-secondary"
                style={{fontSize:'13px',padding:'8px 16px',borderColor:'var(--danger)',color:'var(--danger)'}}
                onClick={() => { if (window.confirm(`¿Eliminar el deck "${deck.name}"?`)) onDeleteDeck(); }}
              >
                🗑 Eliminar deck
              </button>
            )}
          </div>
        </div>
        <div className="deck-progress-bar">
          <div className="deck-progress-fill" style={{width:`${pct}%`,background:pctColor}} />
        </div>
      </div>

      {/* Mana curve */}
      {!loadingCards && Object.keys(manaCurve).length > 0 && (
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px 16px'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'var(--text2)',letterSpacing:'.4px',marginBottom:'12px',fontFamily:"'Cinzel Decorative', serif"}}>
            Curva de Maná
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:'6px',height:'72px'}}>
            {[0,1,2,3,4,5,6,7].map(cmc => {
              const count = manaCurve[cmc] || 0;
              const barH = count > 0 ? Math.max(10, Math.round((count / maxCurveCount) * 56)) : 0;
              const manaColors = {0:'#909090',1:'#e8e8e8',2:'#4488cc',3:'#333355',4:'#cc3333',5:'#228822',6:'#c8a820',7:'#b084ff'};
              return (
                <div key={cmc} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',flex:1,height:'72px',justifyContent:'flex-end'}}>
                  {count > 0 && <div style={{fontSize:'10px',color:'var(--text2)',fontWeight:700,lineHeight:1}}>{count}</div>}
                  <div style={{
                    width:'100%',height:`${barH}px`,
                    background: manaColors[cmc] || 'var(--accent2)',
                    borderRadius:'3px 3px 0 0',
                    transition:'height .4s ease',
                    opacity:.85,
                  }} />
                  <div style={{fontSize:'9px',color:'var(--text2)',fontWeight:700,paddingTop:'2px'}}>
                    {cmc === 7 ? '7+' : cmc}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Lista de faltantes ── */}
      {showShoppingList && !loadingCards && (() => {
        const missing = deck.entries
          .map(e => ({ ...e, owned: getOwnedInfo(e).count }))
          .filter(e => e.owned < e.qty);
        const copyList = () => {
          const text = missing.map(e => `${e.qty - e.owned} ${e.name}`).join('\n');
          navigator.clipboard.writeText(text).then(() => {
            showToast('✅ Lista copiada al portapapeles');
          });
        };
        return (
          <div style={{background:'var(--surface)',border:'1px solid rgba(249,115,22,.4)',borderRadius:'12px',padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',marginBottom:'12px',gap:'8px'}}>
              <div style={{fontSize:'11px',fontWeight:700,color:'#f97316',letterSpacing:'.4px',fontFamily:"'Cinzel Decorative', serif",flex:1}}>
                🛒 Cartas Faltantes
              </div>
              <span style={{fontSize:'11px',color:'var(--text2)'}}>
                {missing.reduce((s,e)=>s+(e.qty-e.owned),0)} copias · {missing.length} cartas distintas
              </span>
              <button
                onClick={copyList}
                style={{
                  fontSize:'11px',padding:'4px 10px',borderRadius:'6px',
                  background:'transparent',border:'1px solid rgba(249,115,22,.5)',
                  color:'#f97316',cursor:'pointer',transition:'all .12s',flexShrink:0,
                }}
              >
                📋 Copiar lista
              </button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
              {missing.map(e => {
                const need = e.qty - e.owned;
                const img  = cardData[e.name]?.img || '';
                const mc   = cardData[e.name]?.manaCost || '';
                const price = cardData[e.name]?.priceEur;
                return (
                  <div key={e.name} style={{
                    display:'flex',alignItems:'center',gap:'8px',
                    padding:'5px 8px',borderRadius:'6px',
                    background:'rgba(249,115,22,.05)',
                    border:'1px solid rgba(249,115,22,.12)',
                  }}
                    onMouseEnter={ev => showCardPreview(ev, e.name)}
                    onMouseLeave={hideCardPreview}
                  >
                    {img && <img src={img} alt={e.name} style={{width:'24px',height:'34px',objectFit:'cover',borderRadius:'3px',flexShrink:0}} onError={ev=>ev.target.style.display='none'} />}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <span style={{fontSize:'13px',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.name}</span>
                        {mc && <ManaCost cost={mc} size={11} />}
                      </div>
                      <div style={{fontSize:'10px',color:'var(--text2)'}}>
                        Tienes {e.owned} · Necesitas {e.qty}
                        {price && <span style={{color:'#4ade80',marginLeft:'8px'}}>€{(parseFloat(price)*need).toFixed(2)}</span>}
                      </div>
                    </div>
                    <div style={{
                      flexShrink:0,fontWeight:800,fontSize:'14px',color:'#f97316',
                      background:'rgba(249,115,22,.15)',borderRadius:'5px',
                      padding:'2px 8px',
                    }}>
                      ×{need}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── Distribución de colores ── */}
      {!loadingCards && colorDist && COLOR_PIPS.some(c => colorDist[c] > 0) && (
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px 16px'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'var(--text2)',letterSpacing:'.4px',marginBottom:'12px',fontFamily:"'Cinzel Decorative', serif"}}>
            Distribución de Colores
          </div>
          {(() => {
            const total = COLOR_PIPS.reduce((s,c) => s + colorDist[c], 0) || 1;
            return (
              <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                {COLOR_PIPS.filter(c => colorDist[c] > 0).map(c => {
                  const meta = COLOR_META[c];
                  const pct  = colorDist[c] / total * 100;
                  return (
                    <div key={c} style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div style={{
                        width:'14px',height:'14px',borderRadius:'50%',flexShrink:0,
                        background:meta.dot, border:`2px solid ${meta.border}`,
                        boxShadow:`0 0 6px ${meta.dot}55`,
                      }} title={meta.label} />
                      <div style={{flex:1,height:'10px',borderRadius:'5px',background:'rgba(255,255,255,.06)',overflow:'hidden'}}>
                        <div style={{
                          height:'100%',borderRadius:'5px',
                          background:`linear-gradient(90deg,${meta.dot}cc,${meta.dot}77)`,
                          width:`${pct}%`, transition:'width .5s ease',
                        }} />
                      </div>
                      <span style={{fontSize:'11px',fontWeight:700,color:meta.dot,width:'28px',textAlign:'right',flexShrink:0}}>
                        {colorDist[c]}
                      </span>
                      <span style={{fontSize:'10px',color:'var(--text2)',width:'32px',textAlign:'right',flexShrink:0}}>
                        {pct.toFixed(0)}%
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}

      {/* ── Random Hand Modal ── */}
      {showHand && (
        <div className="modal-overlay" onClick={() => setShowHand(false)}>
          <div style={{
            background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',
            padding:'24px',maxWidth:'900px',width:'100%',maxHeight:'92vh',overflow:'auto',
          }} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
              <div>
                <h3 style={{fontSize:'18px',fontWeight:700}}>🎲 Mano de apertura</h3>
                <p style={{fontSize:'12px',color:'var(--text2)',marginTop:'3px'}}>
                  7 cartas al azar · ponderadas por cantidad
                </p>
              </div>
              <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                <button className="btn btn-secondary" style={{fontSize:'13px'}} onClick={drawHand}>🔄 Nueva mano</button>
                <button className="icon-btn" onClick={() => setShowHand(false)}>✕</button>
              </div>
            </div>
            <div style={{
              display:'grid',
              gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',
              gap:'12px',
            }}>
              {randomHand.map((name, i) => {
                const img = cardData[name]?.imgNormal || cardData[name]?.img || '';
                const mc  = cardData[name]?.manaCost || '';
                const tl  = (cardData[name]?.typeLine || '').split('—')[0].trim();
                return (
                  <div key={i} style={{display:'flex',flexDirection:'column',gap:'6px',alignItems:'center'}}>
                    <div style={{borderRadius:'10px',overflow:'hidden',boxShadow:'0 4px 18px rgba(0,0,0,.6)',width:'100%'}}>
                      {img
                        ? <img src={img} alt={name} style={{width:'100%',display:'block',borderRadius:'10px'}}
                            onError={e=>{e.target.style.display='none';}} />
                        : <div style={{width:'100%',aspectRatio:'488/680',background:'var(--surface2)',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)',fontSize:'12px'}}>?</div>
                      }
                    </div>
                    <div style={{textAlign:'center',width:'100%'}}>
                      <div style={{fontSize:'11px',fontWeight:600,lineHeight:1.3,marginBottom:'3px'}}>{name}</div>
                      {mc && <div style={{display:'flex',justifyContent:'center'}}><ManaCost cost={mc} size={11} /></div>}
                      {tl && <div style={{fontSize:'9px',color:'var(--text2)',marginTop:'2px'}}>{tl}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Hand analysis */}
            {(() => {
              const lands  = randomHand.filter(n => (cardData[n]?.typeLine||'').toLowerCase().includes('land')).length;
              const spells = randomHand.length - lands;
              const avgCmc = randomHand
                .filter(n => !(cardData[n]?.typeLine||'').toLowerCase().includes('land'))
                .reduce((s,n) => s + (cardData[n]?.cmc||0), 0) / (spells||1);
              const verdict = lands < 2 ? '⚠️ Pocas tierras — considera mulligan'
                : lands > 4 ? '⚠️ Muchas tierras — considera mulligan'
                : avgCmc > 4 ? '⚠️ Mano pesada en CMC'
                : '✅ Mano aceptable';
              return (
                <div style={{
                  marginTop:'18px',padding:'12px 16px',borderRadius:'10px',
                  background:'var(--surface2)',border:'1px solid var(--border)',
                  display:'flex',gap:'20px',flexWrap:'wrap',alignItems:'center',
                }}>
                  <span style={{fontSize:'13px',color:'var(--text2)'}}>
                    🏔️ <strong style={{color:'var(--text)'}}>{lands}</strong> tierras
                  </span>
                  <span style={{fontSize:'13px',color:'var(--text2)'}}>
                    ✨ <strong style={{color:'var(--text)'}}>{spells}</strong> hechizos
                  </span>
                  <span style={{fontSize:'13px',color:'var(--text2)'}}>
                    Ø CMC hechizos: <strong style={{color:'var(--accent)'}}>{avgCmc.toFixed(1)}</strong>
                  </span>
                  <span style={{fontSize:'13px',fontWeight:600,marginLeft:'auto'}}>{verdict}</span>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* Replace entry modal */}
      {replacingEntry && (
        <PrintingModal
          cardName={replacingEntry.name}
          onClose={() => setReplacingEntry(null)}
          replaceMode={true}
          onAdd={card => {
            // Usar replacingEntry.name como clave (igual que fetchAll) para no perder typeLine
            const entryName = replacingEntry.name;
            setCardData(prev => ({
              ...prev,
              [entryName]: {
                img: card.imgS || card.img,
                imgNormal: card.img,
                typeLine: prev[entryName]?.typeLine || card.typeLine,
                manaCost: prev[entryName]?.manaCost || card.manaCost,
                cmc: prev[entryName]?.cmc,
                priceEur: card.priceEur,
              }
            }));
            onReplaceEntry && onReplaceEntry(entryName, card.setCode, card.collectorNumber);
            setReplacingEntry(null);
          }}
        />
      )}

      {/* Type sections */}
      {TYPE_ORDER.map(({ key, label }) => {
        const entries = grouped[key];
        if (!entries || entries.length === 0) return null;
        const secCount = entries.reduce((s, e) => s + e.qty, 0);
        const secValue = !loadingCards
          ? entries.reduce((s, e) => s + parseFloat(cardData[e.name]?.priceEur || 0) * e.qty, 0)
          : null;
        return (
          <div key={key} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'12px',overflow:'hidden'}}>
            <div className="deck-section-header">
              <span style={{fontSize:'15px',fontWeight:700,color:'var(--text)'}}>{label}</span>
              <span style={{fontSize:'12px',color:'var(--text2)',marginLeft:'auto',display:'flex',gap:'10px',alignItems:'center'}}>
                {secValue !== null && secValue > 0 && (
                  <span style={{color:'#4ade80',fontWeight:700}}>€{secValue.toFixed(2)}</span>
                )}
                <span>{secCount} {secCount===1?'carta':'cartas'}</span>
              </span>
            </div>
            {entries.map(entry => {
              const { count: owned, displayCard, hasDifferentEdition } = getOwnedInfo(entry);
              const needed  = entry.qty;
              const complete = owned >= needed;
              const partial  = owned > 0 && owned < needed;
              const apiImg   = cardData[entry.name]?.img || '';
              // Si el usuario tiene la carta en otra edición, mostrar su imagen
              const img = hasDifferentEdition
                ? (displayCard.imgS || displayCard.img || apiImg)
                : apiImg;
              const tl       = cardData[entry.name]?.typeLine || '';
              const statusColor = complete ? '#4ade80' : partial ? 'var(--accent)' : 'var(--danger)';
              const rowBg    = complete
                ? 'rgba(74,222,128,.04)'
                : partial ? 'rgba(196,154,42,.05)' : 'rgba(224,85,85,.05)';
              const mc     = cardData[entry.name]?.manaCost || '';
              const price  = cardData[entry.name]?.priceEur;
              const rowVal = price ? (parseFloat(price) * entry.qty).toFixed(2) : null;
              return (
                <div key={`${entry.name}-${entry.set}`} className="deck-card-row" style={{background:rowBg}}
                  onMouseEnter={e => showCardPreview(e, entry.name)}
                  onMouseLeave={hideCardPreview}
                >
                  {/* Qty badge */}
                  <div style={{
                    flexShrink:0,width:'22px',textAlign:'center',
                    fontSize:'13px',fontWeight:700,color:'var(--text2)',
                  }}>
                    {entry.qty}
                  </div>
                  <img
                    src={img || fallbackImg}
                    alt={entry.name}
                    style={{width:'36px',height:'50px',objectFit:'cover',borderRadius:'4px',flexShrink:0,background:'var(--surface2)'}}
                    onError={e => { e.target.src = fallbackImg; }}
                  />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                      <span style={{fontWeight:600,fontSize:'13px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {entry.name}
                      </span>
                      {mc && <ManaCost cost={mc} size={12} />}
                    </div>
                    <div style={{fontSize:'10px',color:'var(--text2)',marginTop:'1px',display:'flex',gap:'6px',alignItems:'center'}}>
                      <span>{entry.set} #{entry.number}</span>
                      {tl && <span style={{opacity:.6}}>{tl.split('—')[0].trim()}</span>}
                    </div>
                    {hasDifferentEdition && (
                      <div style={{fontSize:'10px',color:'var(--accent)',marginTop:'2px'}}>
                        📦 Tienes: {displayCard.setCode}{displayCard.setName ? ` · ${displayCard.setName.slice(0,22)}` : ''}
                      </div>
                    )}
                  </div>
                  {/* Price column */}
                  <div style={{textAlign:'right',flexShrink:0,minWidth:'52px'}}>
                    {rowVal ? (
                      <>
                        <div style={{fontSize:'11px',fontWeight:700,color:'#4ade80'}}>€{rowVal}</div>
                        {entry.qty > 1 && <div style={{fontSize:'9px',color:'var(--text2)'}}>€{parseFloat(price).toFixed(2)}×{entry.qty}</div>}
                      </>
                    ) : (
                      <div style={{fontSize:'11px',color:'var(--text2)'}}>—</div>
                    )}
                  </div>
                  {/* Owned column */}
                  <div style={{textAlign:'right',flexShrink:0,minWidth:'52px'}}>
                    <div style={{fontSize:'14px',fontWeight:700,color:statusColor}}>{owned}/{needed}</div>
                    <div style={{fontSize:'10px',color:'var(--text2)'}}>
                      {complete ? 'Completa' : partial ? 'Parcial' : 'Falta'}
                    </div>
                  </div>
                  <div style={{fontSize:'16px',flexShrink:0,width:'20px',textAlign:'center'}}>
                    {complete ? '✅' : partial ? '⚠️' : '❌'}
                  </div>
                  <button
                    onClick={e => { e.stopPropagation(); setReplacingEntry(entry); }}
                    title="Cambiar edición de esta carta en el deck"
                    style={{
                      fontSize:'10px', padding:'3px 7px', borderRadius:'5px', flexShrink:0,
                      background:'var(--surface2)', border:'1px solid var(--border)',
                      color:'var(--text2)', cursor:'pointer', lineHeight:1.4,
                      transition:'border-color .12s, color .12s',
                    }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent2)';e.currentTarget.style.color='var(--text)';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text2)';}}
                  >
                    🔄<br/>Cambiar
                  </button>
                </div>
              );
            })}
          </div>
        );
      })}

      </div>
    </div>
  );
}

/* ─── COLLECTION SECTION (folder manager) ─── */
function CollectionSection({ showToast }) {
  const [folders, setFolders] = useState(() => {
    try {
      const saved = localStorage.getItem('mtg_folders');
      if (saved) return JSON.parse(saved);
      const old = localStorage.getItem('mtg_collection');
      if (old) {
        const cards = JSON.parse(old);
        if (cards.length) return [{ id: 'folder-default', name: 'Mi Colección', cards }];
      }
    } catch {}
    return [{ id: 'folder-default', name: 'Mi Colección', cards: [] }];
  });

  const [activeFolderId, setActiveFolderId] = useState(null);
  const activeId = activeFolderId || folders[0]?.id;

  // ── Decks state ──
  const [decks, setDecks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('mtg_decks') || '[]'); } catch { return []; }
  });
  const [viewMode, setViewMode] = useState('collection'); // 'collection' | 'decks'
  const [activeDeckId, setActiveDeckId] = useState(null);
  const [showImportDeck, setShowImportDeck] = useState(false);

  useEffect(() => { localStorage.setItem('mtg_folders', JSON.stringify(folders)); }, [folders]);
  useEffect(() => { localStorage.setItem('mtg_decks',   JSON.stringify(decks));   }, [decks]);

  // All cards across all folders (for deck completion check)
  const allCollectionCards = folders.flatMap(f => f.cards);

  const importDeck = deck => {
    setDecks(prev => [...prev, deck]);
    setActiveDeckId(deck.id);
    showToast(`✅ Deck "${deck.name}" importado — ${deck.entries.length} cartas distintas`);
  };

  const deleteDeck = id => {
    setDecks(prev => {
      const next = prev.filter(d => d.id !== id);
      if (activeDeckId === id) setActiveDeckId(next[0]?.id || null);
      return next;
    });
    showToast('🗑 Deck eliminado');
  };

  const updateFolderCards = (id, cards) =>
    setFolders(prev => prev.map(f => f.id === id ? {...f, cards} : f));

  const deleteFolder = (id, e) => {
    e.stopPropagation();
    if (folders.length <= 1) { showToast('❌ No puedes eliminar la única carpeta'); return; }
    setFolders(prev => {
      const next = prev.filter(f => f.id !== id);
      if (activeId === id) setActiveFolderId(next[0].id);
      return next;
    });
    showToast('🗑 Carpeta eliminada');
  };

  const exportFolder = (folder, e) => {
    e.stopPropagation();
    const data = { version: 1, folderName: folder.name, cards: folder.cards };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mtg-${folder.name.replace(/\s+/g,'-').toLowerCase()}-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast(`📤 "${folder.name}" exportada`);
  };

  const [folderModal, setFolderModal] = useState(null);
  const [folderName, setFolderName] = useState('');

  const openRename = (folder, e) => {
    e.stopPropagation();
    setFolderModal({ mode: 'rename', folderId: folder.id });
    setFolderName(folder.name);
  };

  const confirmFolderModal = () => {
    const name = folderName.trim() || 'Nueva Carpeta';
    if (folderModal.mode === 'new') {
      const id = `folder-${Date.now()}`;
      setFolders(prev => [...prev, { id, name, cards: [] }]);
      setActiveFolderId(id);
    } else {
      setFolders(prev => prev.map(f => f.id === folderModal.folderId ? {...f, name} : f));
    }
    setFolderModal(null);
  };

  const importRef = useRef();
  const [importPending, setImportPending] = useState(null);
  const [importFolderName, setImportFolderName] = useState('');

  const handleImportFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const raw = JSON.parse(ev.target.result);
        let cards, suggestedName;
        if (Array.isArray(raw)) {
          cards = raw; suggestedName = file.name.replace(/\.[^.]+$/, '') || 'Importada';
        } else if (raw.version === 1 && raw.cards) {
          cards = raw.cards; suggestedName = raw.folderName || 'Importada';
        } else { throw new Error(); }
        setImportPending({ cards, suggestedName });
        setImportFolderName(suggestedName);
      } catch { showToast('❌ Archivo inválido'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const confirmImport = () => {
    if (!importPending) return;
    const id = `folder-${Date.now()}`;
    const name = importFolderName.trim() || importPending.suggestedName;
    setFolders(prev => [...prev, { id, name, cards: importPending.cards }]);
    setActiveFolderId(id);
    showToast(`✅ "${name}" importada — ${importPending.cards.length} cartas`);
    setImportPending(null);
  };

  const activeFolder = folders.find(f => f.id === activeId) || folders[0];
  const activeDeck   = decks.find(d => d.id === (activeDeckId || decks[0]?.id)) || decks[0];

  return (
    <div className="collection-layout">
      {/* Title + mode toggle */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
        <img src="static/logo.png" alt="Kaza's Grimoire"
          style={{height:'150px',width:'auto',display:'block',filter:'drop-shadow(0 4px 16px rgba(196,154,42,.4))'}} />
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          <div style={{fontFamily:"'Cinzel Decorative','Palatino Linotype',serif",fontSize:'14px',color:'var(--text2)',lineHeight:1.5,letterSpacing:'0.3px',display:'flex',alignItems:'center',gap:'8px',textShadow:'0 1px 4px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,0.7)'}}>
            <span style={{fontSize:'16px',letterSpacing:'3px'}}>ᚠᛟᛚ</span>
            <span>Organiza tus cartas en carpetas</span>
            <span style={{fontSize:'13px',letterSpacing:'2px',opacity:0.7}}>ᛞᚱ</span>
          </div>
          <div style={{fontFamily:"'Cinzel Decorative','Palatino Linotype',serif",fontSize:'14px',color:'var(--text2)',lineHeight:1.5,letterSpacing:'0.3px',display:'flex',alignItems:'center',gap:'8px',textShadow:'0 1px 4px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,0.7)'}}>
            <span style={{fontSize:'16px',letterSpacing:'3px'}}>ᛁᛗᛈ</span>
            <span>Importa decks y comprueba tu completitud</span>
            <span style={{fontSize:'13px',letterSpacing:'2px',opacity:0.7}}>ᚹᛜ</span>
          </div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'10px'}}>
          <a href="index.html" className="back-btn">✦ VOLVER</a>
          <div className="mode-toggle">
            <button className={`mode-toggle-btn${viewMode==='collection'?' active':''}`} onClick={()=>setViewMode('collection')}>
              📦 Colección
            </button>
            <button className={`mode-toggle-btn${viewMode==='decks'?' active':''}`} onClick={()=>setViewMode('decks')}>
              🃏 Decks{decks.length > 0 ? ` (${decks.length})` : ''}
            </button>
          </div>
        </div>
      </div>

      {viewMode === 'collection' ? (
        <>
          {/* ── Folders bar ── */}
          <div className="folders-bar">
            {folders.map(f => {
              const totalCards = f.cards.reduce((a, c) => a + c.count, 0);
              return (
                <div key={f.id} className={`folder-tab${f.id === activeId ? ' active' : ''}`} onClick={() => setActiveFolderId(f.id)}>
                  <span className="folder-tab-icon">📁</span>
                  <div className="folder-tab-info">
                    <div className="folder-tab-name">{f.name}</div>
                    <div className="folder-tab-count">{totalCards} {totalCards === 1 ? 'carta' : 'cartas'}</div>
                  </div>
                  <div className="folder-tab-actions">
                    <button className="folder-action-btn" title="Renombrar" onClick={e => openRename(f, e)}>✏️</button>
                    <button className="folder-action-btn" title="Exportar JSON" onClick={e => exportFolder(f, e)}>📤</button>
                    <button className="folder-action-btn danger" title="Eliminar carpeta" onClick={e => deleteFolder(f.id, e)}>🗑</button>
                  </div>
                </div>
              );
            })}
            <button className="new-folder-btn" onClick={() => { setFolderModal({ mode: 'new' }); setFolderName(''); }}>
              ＋ Nueva carpeta
            </button>
            <input type="file" accept=".json" ref={importRef} onChange={handleImportFile} style={{ display: 'none' }} />
            <button className="new-folder-btn" onClick={() => importRef.current.click()}>
              📥 Importar
            </button>
          </div>

          {activeFolder && (
            <FolderView
              key={activeFolder.id}
              collection={activeFolder.cards}
              setCollection={cards => updateFolderCards(activeFolder.id, cards)}
              showToast={showToast}
            />
          )}
        </>
      ) : (
        <>
          {/* ── Decks bar ── */}
          <div className="folders-bar">
            {decks.map(d => {
              const totalCards = d.entries.reduce((s,e) => s+e.qty, 0);
              const owned      = d.entries.reduce((s,e) => s + Math.min(e.qty, allCollectionCards.filter(c=>c.name.toLowerCase()===e.name.toLowerCase()).reduce((x,c)=>x+c.count,0)), 0);
              const pct        = totalCards > 0 ? Math.round(owned/totalCards*100) : 0;
              const pctColor   = pct===100 ? '#4ade80' : pct>=50 ? 'var(--accent)' : 'var(--danger)';
              return (
                <div key={d.id} className={`folder-tab${d.id===(activeDeck?.id)?' active':''}`} onClick={()=>setActiveDeckId(d.id)}>
                  <span className="folder-tab-icon">🃏</span>
                  <div className="folder-tab-info">
                    <div className="folder-tab-name">{d.name}</div>
                    <div className="folder-tab-count" style={{color:pctColor,fontWeight:700}}>{pct}% · {totalCards} cartas</div>
                  </div>
                  <div className="folder-tab-actions">
                    <button className="folder-action-btn" title="Exportar deck (formato MTGA)" onClick={e=>{
                      e.stopPropagation();
                      const lines = ['Deck', ...d.entries.map(e => `${e.qty} ${e.name} (${e.set}) ${e.number}`)];
                      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                      const a = document.createElement('a');
                      a.href = URL.createObjectURL(blob);
                      a.download = `${d.name.replace(/\s+/g,'-').toLowerCase()}.txt`;
                      a.click();
                      URL.revokeObjectURL(a.href);
                    }}>📤</button>
                    <button className="folder-action-btn danger" title="Eliminar deck" onClick={e=>{e.stopPropagation();deleteDeck(d.id);}}>🗑</button>
                  </div>
                </div>
              );
            })}
            <button className="new-folder-btn" onClick={() => setShowImportDeck(true)}>
              📥 Importar Deck
            </button>
          </div>

          {activeDeck ? (
            <DeckView
              key={activeDeck.id}
              deck={activeDeck}
              allCollectionCards={allCollectionCards}
              showToast={showToast}
              onReplaceEntry={(entryName, newSet, newNumber) => {
                setDecks(prev => prev.map(d =>
                  d.id !== activeDeck.id ? d : {
                    ...d,
                    entries: d.entries.map(e =>
                      e.name === entryName ? { ...e, set: newSet, number: newNumber } : e
                    )
                  }
                ));
                showToast(`🔄 ${entryName} → ${newSet}`);
              }}
              onDeleteDeck={() => deleteDeck(activeDeck.id)}
            />
          ) : (
            <div className="empty-state">
              <div className="icon">🃏</div>
              <h3>Sin decks importados</h3>
              <p>Importa un deck para ver su completitud con tu colección</p>
              <button className="btn btn-primary" style={{marginTop:'16px'}} onClick={()=>setShowImportDeck(true)}>
                📥 Importar Deck
              </button>
            </div>
          )}
        </>
      )}

      {/* ── New / Rename folder modal ── */}
      {folderModal && (
        <div className="folder-modal-overlay" onClick={() => setFolderModal(null)}>
          <div className="folder-modal" onClick={e => e.stopPropagation()}>
            <h3>{folderModal.mode === 'new' ? '📁 Nueva Carpeta' : '✏️ Renombrar Carpeta'}</h3>
            <input
              autoFocus
              placeholder="Nombre de la carpeta (máx. 15 caracteres)"
              maxLength={15}
              value={folderName}
              onChange={e => setFolderName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') confirmFolderModal(); }}
            />
            <div style={{fontSize:'11px',color:'var(--text2)',textAlign:'right',marginTop:'-8px'}}>
              {folderName.length}/15
            </div>
            <div className="folder-modal-actions">
              <button className="btn btn-secondary" onClick={() => setFolderModal(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={confirmFolderModal}>
                {folderModal.mode === 'new' ? 'Crear' : 'Guardar'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Import folder JSON modal ── */}
      {importPending && (
        <div className="folder-modal-overlay" onClick={() => setImportPending(null)}>
          <div className="folder-modal" onClick={e => e.stopPropagation()}>
            <h3>📥 Importar como nueva carpeta</h3>
            <p style={{ fontSize: '13px', color: 'var(--text2)', marginBottom: '12px' }}>
              El archivo contiene <strong style={{ color: 'var(--text)' }}>{importPending.cards.length} cartas</strong>. ¿Cómo quieres llamar esta carpeta?
            </p>
            <input
              autoFocus
              placeholder="Nombre de la carpeta (máx. 15 caracteres)"
              maxLength={15}
              value={importFolderName}
              onChange={e => setImportFolderName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') confirmImport(); }}
            />
            <div style={{fontSize:'11px',color:'var(--text2)',textAlign:'right',marginTop:'-8px'}}>
              {importFolderName.length}/15
            </div>
            <div className="folder-modal-actions">
              <button className="btn btn-secondary" onClick={() => setImportPending(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={confirmImport}>Importar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Import Deck modal ── */}
      {showImportDeck && (
        <ImportDeckModal
          onClose={() => setShowImportDeck(false)}
          onImport={importDeck}
        />
      )}
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [toast, setToast] = React.useState(null);
  const toastRef = React.useRef();
  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2800);
  };
  return (
    <div className="app">
      <main className="main">
        <CollectionSection showToast={showToast} />
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

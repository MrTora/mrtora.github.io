          {/* Texto legal */}
          <div className="form-row">
            <label
              style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',userSelect:'none'}}
              onClick={()=>upd('legalText',!card.legalText)}>
              <div style={{
                width:'32px',height:'18px',borderRadius:'9px',flexShrink:0,transition:'background .15s',
                background: card.legalText ? 'var(--accent2)' : 'var(--border)',
                position:'relative',
              }}>
                <div style={{
                  position:'absolute',top:'3px',
                  left: card.legalText ? '16px' : '3px',
                  width:'12px',height:'12px',borderRadius:'50%',background:'#fff',
                  transition:'left .15s',
                }}/>
              </div>
              <span style={{fontSize:'11px',color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.4px'}}>
                Texto legal (proxy)
              </span>
            </label>
          </div>

          {/* Offset del texto para marcos custom */}
          {card.frame && card.frame.startsWith('custom-') && (
            <div className="form-row">
              <label>Posición del texto</label>
              <div style={{display:'flex',flexDirection:'column',gap:'8px',padding:'10px 12px',background:'var(--surface2)',borderRadius:'7px',border:'1px solid var(--border)'}}>
                <div style={{fontSize:'10px',color:'var(--text2)',lineHeight:1.4}}>
                  Ajusta si el texto no coincide con las áreas del marco personalizado.
                </div>
                <SliderRow label="⬌ X" value={card.textX||0} min={-40} max={40} onChange={v=>upd('textX',v)} />
                <SliderRow label="⬍ Y" value={card.textY||0} min={-40} max={40} onChange={v=>upd('textY',v)} />
                <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:'11px'}}
                  onClick={()=>setCard(c=>({...c,textX:0,textY:0}))}>↺ Reset posición</button>
              </div>
            </div>
          )}

          {/* Rarity */}
          <div className="form-row">
            <label>Rareza</label>
            <div className="rarity-grid">
              {RARITY_OPTS.map(r=>(
                <button key={r.id} className="rarity-btn"
                  style={{
                    borderColor: (card.rarity||'common')===r.id ? r.color : 'var(--border)',
                    background:  (card.rarity||'common')===r.id ? r.color+'22' : 'var(--surface2)',
                    color:       (card.rarity||'common')===r.id ? r.color : 'var(--text2)',
                  }}
                  onClick={()=>upd('rarity',r.id)}>
                  {r.sym} {r.label}
                </button>
              ))}
            </div>
          </div>

          {/* Rarity symbol position */}
          <div className="form-row">
            <label>Posición del símbolo de rareza</label>
            <div style={{display:'flex',flexDirection:'column',gap:'8px',padding:'10px 12px',background:'var(--surface2)',borderRadius:'7px',border:'1px solid var(--border)'}}>
              <SliderRow label="⬌ X" value={card.rarityX||0} min={-30} max={30} onChange={v=>upd('rarityX',v)} />
              <SliderRow label="⬍ Y" value={card.rarityY||0} min={-30} max={30} onChange={v=>upd('rarityY',v)} />
              <SliderRow label="🔍 Tamaño" value={card.raritySize||100} min={50} max={250} onChange={v=>upd('raritySize',v)} unit="%" />
              <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:'11px'}}
                onClick={()=>setCard(c=>({...c,rarityX:0,rarityY:0,raritySize:100}))}>↺ Reset</button>
            </div>
          </div>

          {/* Artist */}
          <div className="form-row">
            <label>Artista</label>
            <input value={card.artist} onChange={e=>upd('artist',e.target.value)} placeholder="Nombre del artista" />
            <div style={{display:'flex',flexDirection:'column',gap:'6px',marginTop:'6px',padding:'8px 10px',background:'var(--surface2)',borderRadius:'6px',border:'1px solid var(--border)'}}>
              <span style={{fontSize:'10px',color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.4px'}}>Posición y estilo de artista/coleccionista</span>
              <SliderRow label="⬌ X" value={card.artistX||0} min={-60} max={60} onChange={v=>upd('artistX',v)} />
              <SliderRow label="⬍ Y" value={card.artistY||0} min={-20} max={20} onChange={v=>upd('artistY',v)} />
              <SliderRow label="Tamaño" value={card.artistSize||100} min={60} max={180} onChange={v=>upd('artistSize',v)} unit="%" />
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}>
                <span style={{fontSize:'11px',color:'var(--text2)'}}>Color</span>
                <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <input type="color" value={card.artistColor||'#888888'}
                    onChange={e=>upd('artistColor',e.target.value)}
                    style={{width:'36px',height:'26px',border:'1px solid var(--border)',borderRadius:'4px',cursor:'pointer',background:'none',padding:'1px'}} />
                  {card.artistColor && (
                    <button onClick={()=>upd('artistColor','')}
                      style={{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text2)',cursor:'pointer'}}>
                      Reset
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Collector info */}
          <div className="form-three">
            <div className="form-row">
              <label>Número</label>
              <input value={card.collectorNum} onChange={e=>upd('collectorNum',e.target.value)} placeholder="001/280" />
            </div>
            <div className="form-row">
              <label>Set</label>
              <input value={card.setCode} onChange={e=>upd('setCode',e.target.value)} placeholder="MKM" />
            </div>
            <div className="form-row">
              <label>Idioma</label>
              <select value={card.language||'EN'} onChange={e=>upd('language',e.target.value)}>
                {['EN','ES','FR','DE','IT','PT','JA','KO','RU','ZHS','ZHT'].map(l=>(
                  <option key={l} value={l}>{l}</option>
                ))}
              </select>
            </div>
          </div>

          {isCreature && (
            <>
              <div className="form-two">
                <div className="form-row">
                  <label>Fuerza</label>
                  <input type="text" value={card.power} onChange={e=>upd('power',e.target.value)} placeholder="4" />
                </div>
                <div className="form-row">
                  <label>Resistencia</label>
                  <input type="text" value={card.toughness} onChange={e=>upd('toughness',e.target.value)} placeholder="4" />
                </div>
              </div>
              <div className="form-row">
                <label>Posición y estilo de F/R</label>
                <div style={{display:'flex',flexDirection:'column',gap:'8px',padding:'10px 12px',background:'var(--surface2)',borderRadius:'7px',border:'1px solid var(--border)'}}>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',userSelect:'none'}}
                    onClick={()=>upd('ptFrame',!card.ptFrame)}>
                    <div style={{
                      width:'32px',height:'18px',borderRadius:'9px',flexShrink:0,transition:'background .15s',
                      background: card.ptFrame ? 'var(--accent2)' : 'var(--border)', position:'relative',
                    }}>
                      <div style={{
                        position:'absolute',top:'3px',
                        left: card.ptFrame ? '16px' : '3px',
                        width:'12px',height:'12px',borderRadius:'50%',background:'#fff',
                        transition:'left .15s',
                      }}/>
                    </div>
                    <span style={{fontSize:'11px',color:'var(--text2)',fontWeight:600}}>
                      {card.ptFrame ? 'Con recuadro' : 'Solo número'}
                    </span>
                  </label>
                  <SliderRow label="⬌ X" value={card.ptX||0} min={-60} max={60} onChange={v=>upd('ptX',v)} />
                  <SliderRow label="⬍ Y" value={card.ptY||0} min={-60} max={60} onChange={v=>upd('ptY',v)} />
                  <SliderRow label="🔍 Tamaño" value={card.ptSize||100} min={50} max={200} onChange={v=>upd('ptSize',v)} unit="%" />
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}>
                    <span style={{fontSize:'11px',color:'var(--text2)'}}>Color</span>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                      <input type="color" value={card.ptColor||'#ffffff'}
                        onChange={e=>upd('ptColor',e.target.value)}
                        style={{width:'36px',height:'26px',border:'1px solid var(--border)',borderRadius:'4px',cursor:'pointer',background:'none',padding:'1px'}} />
                      {card.ptColor && (
                        <button onClick={()=>upd('ptColor','')}
                          style={{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text2)',cursor:'pointer'}}>
                          Reset
                        </button>
                      )}
                    </div>
                  </div>
                  <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:'11px'}}
                    onClick={()=>setCard(c=>({...c,ptX:0,ptY:0,ptSize:100,ptFrame:false,ptColor:''}))}>↺ Reset</button>
                </div>
              </div>
            </>
          )}
          {isPW && (
            <div className="form-row">
              <label>Lealtad inicial</label>
              <input type="text" value={card.loyalty} onChange={e=>upd('loyalty',e.target.value)} placeholder="4" />
            </div>
          )}

          {/* ── PRESETS DE POSICIÓN ── */}
          <div className="form-row">
            <label>Presets de posición / estilo</label>
            <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
              <input
                value={presetName}
                onChange={e=>setPresetName(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter') savePreset(); }}
                placeholder="Nombre del preset…"
                style={{flex:1,fontSize:'12px'}}
              />
              <button className="btn btn-secondary" style={{padding:'5px 10px',fontSize:'12px',flexShrink:0}}
                onClick={savePreset}>💾 Guardar</button>
            </div>
            {presets.length === 0 && (
              <div style={{fontSize:'11px',color:'var(--text2)',fontStyle:'italic',padding:'4px 0'}}>
                Aún no hay presets guardados.
              </div>
            )}
            {presets.map(p => (
              <div key={p.name} style={{
                display:'flex',alignItems:'center',gap:'6px',
                padding:'5px 8px',borderRadius:'6px',
                background:'var(--surface2)',border:'1px solid var(--border)',marginBottom:'4px',
              }}>
                <span style={{flex:1,fontSize:'12px',fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                <button className="btn btn-secondary" style={{padding:'3px 9px',fontSize:'11px'}}
                  onClick={()=>loadPreset(p)}>Cargar</button>
                <button style={{
                  padding:'3px 7px',fontSize:'11px',borderRadius:'4px',
                  border:'1px solid var(--border)',background:'transparent',
                  color:'var(--text2)',cursor:'pointer',
                }} onClick={()=>deletePreset(p.name)}>✕</button>
              </div>
            ))}
          </div>

          <div className="form-row">
            <label>Copias a imprimir</label>
            <input type="number" min="1" max="9" value={copies} onChange={e=>setCopies(Number(e.target.value))} />
          </div>

          <div className="btn-row">
            <button className="btn btn-primary" onClick={()=>window.print()}>🖨️ Imprimir</button>
            <button className="btn btn-secondary"
              style={{display:'flex',alignItems:'center',gap:'6px'}}
              onClick={downloadCard} disabled={downloading}>
              {downloading ? <span className="spinner" style={{width:'14px',height:'14px'}} /> : '⬇️'}
              {downloading ? 'Exportando…' : 'Descargar PNG'}
            </button>
            <button className="btn btn-secondary" onClick={()=>{ setCard({...defaultCard}); setArt(null); }}>↺ Limpiar</button>
          </div>
        </div>

        {/* ── PREVIEW ── */}
        <div className="preview-panel">
          <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
            <span className="preview-label">Vista previa en tiempo real</span>
            <button
              style={{
                padding:'4px 10px', fontSize:'11px', borderRadius:'6px', fontWeight:600,
                border:`1.5px solid ${showSafeZone ? '#c49a2a' : 'var(--border)'}`,
                background: showSafeZone ? 'rgba(196,154,42,.15)' : 'var(--surface2)',
                color: showSafeZone ? '#c49a2a' : 'var(--text2)', cursor:'pointer',
              }}
              onClick={()=>setShowSafeZone(v=>!v)}
            >
              {showSafeZone ? '✕ Ocultar' : '⊞ Zona segura'}
            </button>
          </div>

          <div className="card-wrap">
            {Array.from({length: Math.max(1, copies)}, (_,i) => (
              <div key={i} className="editor-card-outer">
                <div className="editor-card-scale">
                  <MtgCard card={card} art={art} customFrames={customFrames} />
                </div>
                {showSafeZone && (() => {
                  const era = ART_ERAS[card.artEra || 'postmodern'] || ART_ERAS.postmodern;
                  const S = 1.5;
                  const hoff = Math.round((232 - era.wPx) / 2);
                  const artL = (6 + hoff) * S;
                  const artT = 34 * S;
                  const artW = era.wPx * S;
                  const artH = era.hPx * S;
                  return (
                    <div className="safe-zone-wrap">
                      <div className="sz-cut" />
                      <div className="sz-safe" />
                      <div className="sz-art" style={{left:artL,top:artT,width:artW,height:artH}} />
                      <span className="sz-label" style={{top:2,left:4,color:'rgba(255,100,100,.9)'}}>Corte 63×88mm</span>
                      <span className="sz-label" style={{top:20,left:22,color:'rgba(255,200,0,.9)'}}>Zona segura</span>
                      <span className="sz-label" style={{top:artT+2,left:artL+2,color:'rgba(0,200,255,.9)'}}>Arte {era.wMm}×{era.hMm}mm</span>
                    </div>
                  );
                })()}
              </div>
            ))}
          </div>

          {showSafeZone && (() => {
            const era = ART_ERAS[card.artEra || 'postmodern'] || ART_ERAS.postmodern;
            const hoff = Math.round((232 - era.wPx) / 2);
            const artXpx = 6 + hoff;
            const artYpx = 34;
            return (
              <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'8px',padding:'10px 14px',fontSize:'11px',color:'var(--text2)',lineHeight:1.8}}>
                <b style={{color:'var(--text)',fontSize:'12px'}}>📐 Guía para diseñar marcos personalizados</b><br/>
                <span style={{color:'rgba(255,100,100,.9)'}}>── Corte</span> borde exterior · Carta: <b>244×341 px</b> en pantalla / <b>63×88mm</b> / <b>744×1039 px a 300 DPI</b><br/>
                <span style={{color:'rgba(255,200,0,.9)'}}>┄ Zona segura</span> 3mm dentro del corte · mantén texto y símbolos dentro<br/>
                <span style={{color:'rgba(0,200,255,.9)'}}>┄ Arte — {era.label} ({era.years})</span> {era.wMm}×{era.hMm}mm<br/>
                &nbsp;&nbsp;En pantalla: x={artXpx}, y={artYpx}, ancho={era.wPx}px, alto={era.hPx}px<br/>
                &nbsp;&nbsp;A 300 DPI: x={Math.round(artXpx*744/244)}, y={Math.round(artYpx*1039/341)}, ancho={Math.round(era.wPx*744/244)}px, alto={Math.round(era.hPx*1039/341)}px<br/>
                El PNG del marco debe ser <b>744×1039 px</b> (300 DPI) con el área de arte transparente en esa posición
              </div>
            );
          })()}

          <p className="print-hint">
            💡 <b>63 × 88mm</b> · Radio esquinas 3mm · Para diseño digital: <b>744 × 1039px a 300 DPI</b><br/>
            Al imprimir: elige <em>Tamaño real</em>, sin escalar. Se imprimen hasta <b>9 cartas por hoja A4</b> (grilla 3×3) automáticamente.
          </p>
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div className="app">
      <header className="header">
        <div className="header-logo">Kaza's <span>Grimoire</span></div>
        <nav className="nav">
          <a href="editor.html" className="nav-btn active">✏️ Editor Proxy</a>
          <a href="coleccion.html" className="nav-btn">📦 Mi Colección</a>
        </nav>
      </header>
      <main className="main">
        <EditorSection />
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

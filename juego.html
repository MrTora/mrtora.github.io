<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kaza's Grimoire — Mesa de Juego</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --surface: rgba(42,26,9,0.96); --surface2: rgba(56,36,12,0.98);
      --border: rgba(155,108,38,0.5); --accent: #c49a2a; --accent2: #8b5cf6;
      --text: #edddb8; --text2: #9a7c50; --red: #f87171; --green: #4ade80;
    }
    html, body, #root { height: 100%; overflow: hidden; background: #0a0a12; color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
    button { cursor: pointer; border: none; font-family: inherit; }
    input  { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Shared ── */
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all .15s; }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #d4aa3a; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent2); }
    .btn-danger    { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.4); }
    .input-field   { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; width: 100%; }
    .input-field:focus { outline: none; border-color: var(--accent2); }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Lobby / Select screens ── */
    .screen-center {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; padding: 20px;
      background: linear-gradient(rgba(8,6,12,.72),rgba(8,6,12,.72)), url('static/wallpaper.png') center/cover no-repeat fixed;
    }
    .logo { font-family: 'Cinzel Decorative', serif; font-size: 20px; color: var(--accent); letter-spacing: 1px; }
    .card-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    .panel-title { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--text); }
    .code-display {
      font-size: 34px; font-weight: 800; letter-spacing: 10px; color: var(--accent);
      text-align: center; padding: 16px; background: var(--surface2);
      border: 2px dashed var(--border); border-radius: 10px; font-family: 'Courier New', monospace;
    }
    .deck-item {
      padding: 12px 16px; border-radius: 10px; border: 2px solid var(--border);
      background: var(--surface2); cursor: pointer; transition: all .12s;
      display: flex; align-items: center; gap: 12px;
    }
    .deck-item:hover { border-color: var(--accent); }
    .deck-item.selected { border-color: var(--accent2); background: rgba(139,92,246,.12); }
    .format-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: rgba(139,92,246,.2); color: var(--accent2); border: 1px solid rgba(139,92,246,.4); margin-left: auto; flex-shrink: 0; text-transform: uppercase; }
    .progress-bar { width: 100%; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .2s; }

    /* ── Game layout ── */
    .game-root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0d0d18; }

    /* Header */
    .game-header {
      flex-shrink: 0; height: 38px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; padding: 0 10px; z-index: 10;
    }
    .gh-logo { font-family: 'Cinzel Decorative', serif; font-size: 11px; color: var(--accent); white-space: nowrap; }
    .gh-sep  { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .gh-pill { padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); white-space: nowrap; }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: background .3s; }
    .conn-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .conn-dot.off { background: var(--red); }
    .conn-dot.wait { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }

    /* Zones */
    .opp-zone   { flex: 0 0 auto; height: 40vh; min-height: 175px; display: flex; flex-direction: column; border-bottom: 2px solid rgba(139,92,246,.2); background: rgba(20,10,30,.45); position: relative; }
    .player-zone { flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative; }

    /* Info bars */
    .info-bar { flex-shrink: 0; height: 34px; display: flex; align-items: center; gap: 7px; padding: 0 9px; background: rgba(0,0,0,.38); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .info-bar.bottom { border-top: 1px solid var(--border); border-bottom: none; }
    .life-val { font-size: 19px; font-weight: 800; color: var(--green); min-width: 34px; text-align: center; cursor: pointer; }
    .life-val.low { color: var(--red); }
    .life-btn { width: 21px; height: 21px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .life-btn:hover { border-color: var(--accent); }
    .zone-pill { display: flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); font-size: 11px; color: var(--text2); cursor: pointer; transition: border-color .12s; white-space: nowrap; flex-shrink: 0; }
    .zone-pill:hover { border-color: var(--accent); }

    /* Battlefield */
    .bf-wrap { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .bf {
      flex: 1; min-height: 0; display: flex; flex-wrap: wrap; align-content: flex-start;
      gap: 4px; padding: 5px; overflow-y: auto; overflow-x: hidden;
    }
    .bf.lands { flex: 0 0 110px; border-left: 1px solid rgba(155,108,38,.18); background: rgba(0,40,0,.07); }
    .bf-label { font-size: 9px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; padding: 2px 4px; background: rgba(0,0,0,.55); width: 100%; flex-shrink: 0; }

    /* Battlefield card */
    .bf-card { position: relative; cursor: pointer; transition: transform .2s ease, filter .15s; transform-origin: center center; flex-shrink: 0; user-select: none; }
    .bf-card.tapped { transform: rotate(90deg); }
    .bf-card:hover { z-index: 5; }
    .bf-card:hover img { box-shadow: 0 0 14px rgba(196,154,42,.65); }
    .bf-card.sickness img { filter: brightness(.72) saturate(.55); }
    .bf-card.attacking img { box-shadow: 0 0 14px 3px rgba(248,113,113,.85) !important; }
    .bf-card.blocking  img { box-shadow: 0 0 14px 3px rgba(74,222,128,.85) !important; }
    .bf-card img { display: block; width: 68px; border-radius: 5px; box-shadow: 0 3px 10px rgba(0,0,0,.6); }
    .bf-card .no-img { width: 68px; height: 95px; border-radius: 5px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text2); text-align: center; padding: 3px; line-height: 1.3; box-shadow: 0 3px 10px rgba(0,0,0,.6); }
    .bf-card .ctrs { position: absolute; bottom: 2px; left: 0; right: 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 1px; }
    .ctr-badge { font-size: 8px; font-weight: 800; padding: 1px 4px; border-radius: 3px; background: rgba(0,0,0,.85); border: 1px solid rgba(255,255,255,.2); color: #fff; }

    /* Hand */
    .hand-bar { flex-shrink: 0; min-height: 84px; max-height: 108px; display: flex; align-items: flex-end; padding: 4px 8px 4px; gap: 3px; overflow-x: auto; overflow-y: hidden; background: rgba(0,0,0,.28); border-top: 1px solid var(--border); }
    .hand-card { flex-shrink: 0; cursor: pointer; transition: transform .15s; z-index: 1; position: relative; }
    .hand-card:hover { transform: translateY(-15px); z-index: 10; }
    .hand-card img { display: block; width: 68px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.7); }
    .hand-card .no-img { width: 68px; height: 95px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text2); text-align: center; padding: 3px; line-height: 1.3; }

    /* Opponent hand (face down) */
    .opp-hand { flex-shrink: 0; height: 46px; display: flex; align-items: center; padding: 0 8px; gap: 0; overflow: hidden; border-top: 1px solid rgba(155,108,38,.18); }
    .face-down { width: 32px; height: 44px; border-radius: 4px; background: linear-gradient(135deg,#1a0e00,#3a2010,#1a0e00); border: 1px solid rgba(155,108,38,.45); flex-shrink: 0; margin-right: -12px; box-shadow: 0 2px 6px rgba(0,0,0,.5); }

    /* Phase bar */
    .phase-bar { flex-shrink: 0; height: 32px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 6px; overflow-x: auto; gap: 0; }
    .ph-btn { padding: 3px 9px; font-size: 11px; font-weight: 600; background: transparent; color: var(--text2); border: none; border-radius: 4px; white-space: nowrap; transition: all .12s; flex-shrink: 0; }
    .ph-btn:hover { background: var(--surface2); color: var(--text); }
    .ph-btn.active { background: var(--accent2); color: #fff; }
    .ph-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; margin: 0 1px; }
    .turn-pill { margin-left: auto; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; flex-shrink: 0; white-space: nowrap; }
    .turn-mine   { background: rgba(74,222,128,.14); color: var(--green); border: 1px solid rgba(74,222,128,.38); }
    .turn-theirs { background: rgba(248,113,113,.14); color: var(--red);   border: 1px solid rgba(248,113,113,.38); }

    /* Action bar */
    .action-bar { flex-shrink: 0; height: 34px; background: rgba(0,0,0,.38); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 5px; padding: 0 7px; overflow-x: auto; }
    .act-btn { padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; transition: all .12s; }
    .act-btn:hover { border-color: var(--accent); color: var(--text); }
    .act-btn.hl { border-color: var(--accent2); color: var(--accent2); }
    .act-btn.go { border-color: var(--green);   color: var(--green); }
    .act-btn:disabled { opacity: .38; pointer-events: none; }

    /* Context menu */
    .ctx { position: fixed; z-index: 1000; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; min-width: 162px; box-shadow: 0 8px 32px rgba(0,0,0,.75); }
    .ctx-item { padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; color: var(--text); }
    .ctx-item:hover { background: var(--surface2); }
    .ctx-item.danger { color: var(--red); }
    .ctx-sep   { height: 1px; background: var(--border); margin: 3px 0; }
    .ctx-label { padding: 3px 12px; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }

    /* Zone modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.87); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 16px; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; max-width: 580px; width: 100%; max-height: 88vh; display: flex; flex-direction: column; gap: 12px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; }
    .modal-grid { display: flex; flex-wrap: wrap; gap: 10px; overflow-y: auto; flex: 1; }
    .zone-card { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .zone-card img { width: 86px; border-radius: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.5); }
    .zone-card span { font-size: 10px; color: var(--text2); text-align: center; max-width: 86px; line-height: 1.3; }

    /* Game log */
    .log-panel { position: absolute; bottom: 0; right: 0; width: 210px; max-height: 110px; background: rgba(0,0,0,.72); border-top-left-radius: 9px; border: 1px solid var(--border); border-bottom: none; border-right: none; overflow-y: auto; padding: 5px 7px; pointer-events: none; z-index: 20; }
    .log-line { font-size: 10px; line-height: 1.5; padding: 1px 0; color: var(--text2); }
    .log-line.mine { color: var(--text); }
    .log-line.sys  { color: var(--accent); font-weight: 600; }

    /* Disconnected */
    .disc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 900; gap: 14px; }

    /* Opp label */
    .opp-label { position: absolute; top: 3px; right: 7px; z-index: 10; font-size: 10px; font-weight: 600; color: var(--text2); opacity: .65; }
    .empty-hint { opacity: .22; font-size: 11px; color: var(--text2); text-align: center; width: 100%; padding: 10px 0; }

    /* ── Stack zone ── */
    .stack-zone { flex-shrink: 0; background: rgba(139,92,246,.07); border-top: 2px solid rgba(139,92,246,.38); border-bottom: 2px solid rgba(139,92,246,.38); padding: 6px 10px; display: flex; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto; }
    .stack-header { font-size: 10px; font-weight: 800; color: var(--accent2); letter-spacing: .5px; text-transform: uppercase; padding: 0 2px; }
    .stack-entry { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,.38); border-radius: 8px; padding: 5px 9px; border: 1px solid rgba(139,92,246,.3); }
    .stack-entry.opp-entry { border-color: rgba(248,113,113,.45); background: rgba(248,113,113,.06); }
    .stack-entry.search-entry { border-color: rgba(74,222,128,.45); background: rgba(74,222,128,.06); }
    .stack-img { width: 34px; border-radius: 4px; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,.6); }
    .stack-name { font-size: 12px; font-weight: 700; line-height: 1.2; }
    .stack-type { font-size: 10px; color: var(--text2); margin-top: 1px; }
    .stack-who  { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .stack-who.mine { background: rgba(139,92,246,.18); color: var(--accent2); }
    .stack-who.opp  { background: rgba(248,113,113,.18); color: var(--red); }
    .stack-acts { display: flex; gap: 5px; margin-left: auto; flex-shrink: 0; }
    .stack-btn { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; white-space: nowrap; transition: all .12s; }
    .stack-btn.accept { border-color: var(--green);  color: var(--green);  background: rgba(74,222,128,.1); }
    .stack-btn.accept:hover { background: rgba(74,222,128,.22); }
    .stack-btn.counter{ border-color: var(--red);    color: var(--red);    background: rgba(248,113,113,.1); }
    .stack-btn.counter:hover { background: rgba(248,113,113,.22); }
    .stack-btn.cancel { border-color: var(--border); color: var(--text2); }
    .stack-btn.cancel:hover { border-color: var(--accent); color: var(--text); }
    @keyframes stackPulse { 0%,100%{border-color:rgba(139,92,246,.38)} 50%{border-color:rgba(139,92,246,.9)} }
    .stack-zone.active { animation: stackPulse 1.4s ease-in-out infinite; }

    /* ── Library modal ── */
    .lib-modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0; max-width: 680px; width: 100%; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; }
    .lib-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .lib-tab { flex: 1; padding: 10px 6px; font-size: 12px; font-weight: 700; background: transparent; color: var(--text2); border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: all .12s; }
    .lib-tab:hover { color: var(--text); }
    .lib-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(196,154,42,.06); }
    .lib-body { flex: 1; min-height: 0; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .lib-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; }
    .lib-search:focus { outline: none; border-color: var(--accent2); }
    .lib-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .lib-card-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; border: 2px solid transparent; border-radius: 8px; padding: 3px; transition: border-color .1s; }
    .lib-card-item:hover { border-color: var(--accent); }
    .lib-card-item img { width: 80px; border-radius: 6px; }
    .lib-card-item .lib-name { font-size: 9px; color: var(--text2); text-align: center; max-width: 80px; line-height: 1.3; }
    .lib-card-no-img { width: 80px; height: 112px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text2); text-align: center; padding: 4px; line-height: 1.3; }
    /* Scry */
    .scry-card { display: flex; align-items: center; gap: 10px; padding: 8px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
    .scry-card img { width: 54px; border-radius: 5px; }
    .scry-card .scry-name { flex: 1; font-size: 12px; font-weight: 600; }
    .scry-card .scry-type { font-size: 10px; color: var(--text2); }
    .scry-btn-group { display: flex; gap: 4px; }
    .scry-btn { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; }
    .scry-btn.top-sel  { background: rgba(74,222,128,.18); border-color: var(--green);  color: var(--green); }
    .scry-btn.bot-sel  { background: rgba(248,113,113,.18); border-color: var(--red);   color: var(--red); }
    /* Mill / number input */
    .num-row { display: flex; align-items: center; gap: 10px; }
    .num-input { width: 80px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 20px; font-weight: 800; text-align: center; }
    .num-input:focus { outline: none; border-color: var(--accent); }

    /* ── Card zoom overlay ── */
    .card-zoom-bg {
      position: fixed; inset: 0; z-index: 800; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.88); cursor: pointer; animation: fadeIn .12s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card-zoom-img { max-height: 88vh; max-width: 50vw; border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,.95); pointer-events: none; }
    .card-zoom-hint { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.7); border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px; font-size: 11px; color: var(--text2); pointer-events: none; white-space: nowrap; }
    .card-zoom-actions { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; }
    .card-zoom-actions button { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; background: var(--surface); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: all .12s; white-space: nowrap; }
    .card-zoom-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .card-zoom-name { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 700; color: var(--text); background: rgba(0,0,0,.7); border: 1px solid var(--border); border-radius: 7px; padding: 4px 14px; pointer-events: none; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }

    /* ── Zone piles column ── */
    .zone-col { flex: 0 0 78px; display: flex; flex-direction: column; gap: 6px; padding: 5px 4px; border-left: 1px solid rgba(155,108,38,.15); background: rgba(0,0,0,.15); overflow: hidden; align-items: center; }
    .zone-pile-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; flex-shrink: 0; }
    .zone-pile-wrap:hover .pile-img { box-shadow: 0 0 10px rgba(196,154,42,.7); }
    .pile-img { display: block; width: 54px; border-radius: 5px; box-shadow: 0 3px 8px rgba(0,0,0,.7); }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useReducer, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════
   ABLY — conexión en tiempo real (reemplaza PeerJS)
═══════════════════════════════════════════════ */
const ABLY_KEY = '75uUVw.7kbHVQ:zrq-gEK7EyZN15bVI1P9-QKZCmmSszp51DnVzQkE17k';

/* Crea un objeto "conn" compatible con la API que usa el resto del juego */
function makeConn(channel, myRole) {
  const otherRole = myRole === 'host' ? 'joiner' : 'host';
  const listeners = { data: [], close: [], error: [] };

  channel.subscribe('msg', msg => {
    if (msg.data?.from === otherRole) {
      const d = { ...msg.data };
      delete d.from;
      listeners.data.forEach(fn => fn(d));
    }
  });

  channel.presence.subscribe('leave', member => {
    if (member.clientData?.role === otherRole || member.data?.role === otherRole) {
      listeners.close.forEach(fn => fn());
    }
  });

  return {
    get open() { return true; },
    send(data) { channel.publish('msg', { ...data, from: myRole }).catch(() => {}); },
    on(ev, fn)  { if (listeners[ev]) listeners[ev].push(fn); },
    off(ev, fn) { if (listeners[ev]) listeners[ev] = listeners[ev].filter(f => f !== fn); },
  };
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
const uid = () => Math.random().toString(36).slice(2, 10);
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

const CACHE_KEY = 'mtg_card_cache_v3';
function readCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch { return {}; } }

async function fetchCard(set, num) {
  const key = `${set.toLowerCase()}_${num}`;
  const cached = readCache()[key];
  if (cached && Date.now() - cached.at < 86400000) return { ...cached.d, _c: true };
  try {
    const r = await fetch(`https://api.scryfall.com/cards/${set.toLowerCase()}/${num}`);
    const d = await r.json();
    if (d.object === 'error') return null;
    const slim = {
      imgNormal: d.image_uris?.normal || d.card_faces?.[0]?.image_uris?.normal || '',
      imgSmall:  d.image_uris?.small  || d.card_faces?.[0]?.image_uris?.small  || '',
      typeLine:  d.type_line || '',
      manaCost:  d.mana_cost || d.card_faces?.[0]?.mana_cost || '',
    };
    const nc = readCache(); nc[key] = { d: slim, at: Date.now() };
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(nc)); } catch {}
    return slim;
  } catch { return null; }
}

async function expandDeck(entries, onProgress) {
  const cards = [];
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    onProgress(i + 1, entries.length);
    const d = await fetchCard(e.set, e.number);
    for (let j = 0; j < e.qty; j++) {
      cards.push({ uid: uid(), name: e.name, img: d?.imgNormal || '', typeLine: d?.typeLine || '', manaCost: d?.manaCost || '', setCode: (e.set||'').toUpperCase(), number: e.number });
    }
    if (d && !d._c) await new Promise(r => setTimeout(r, 70));
  }
  return cards;
}

const isLand = c => (c.typeLine || '').toLowerCase().includes('land');

/* ═══════════════════════════════════════════════
   GAME REDUCER
   [EXTEND] Agregar nuevas acciones aquí
═══════════════════════════════════════════════ */
const INIT = { life: 20, poison: 0, library: [], hand: [], battlefield: [], graveyard: [], exile: [], stack: [], phase: 'main1', turnNumber: 1, isMyTurn: false, pendingSearch: false, revealHand: false };

// True if card resolves to battlefield (not instant/sorcery)
const resolveToField = c => {
  const t = (c.typeLine || '').toLowerCase();
  return !t.includes('instant') && !t.includes('sorcery');
};

function reducer(state, action) {
  switch (action.type) {
    case 'INIT_DECK':
      return { ...INIT, library: shuffle(action.cards) };
    case 'SET_TURN':
      return { ...state, turnNumber: action.n, isMyTurn: action.mine };
    case 'SET_PHASE':
      return { ...state, phase: action.phase };
    case 'DRAW': {
      if (!state.library.length) return state;
      const [card, ...lib] = state.library;
      return { ...state, library: lib, hand: [...state.hand, card] };
    }
    case 'DRAW_N': {
      const n = Math.min(action.n, state.library.length);
      return { ...state, library: state.library.slice(n), hand: [...state.hand, ...state.library.slice(0, n)] };
    }
    case 'PLAY': {
      // Lands only — bypass the stack
      const card = state.hand.find(c => c.uid === action.uid);
      if (!card) return state;
      return {
        ...state,
        hand: state.hand.filter(c => c.uid !== action.uid),
        battlefield: [...state.battlefield, { ...card, tapped: false, counters: [], summoningSick: false, attacking: false, blocking: false }],
      };
    }
    case 'SEARCH_STACK': {
      const entry = { uid: action.uid, name: 'Buscar en biblioteca', typeLine: '— Acción —', isSearch: true, img: '' };
      return { ...state, stack: [...state.stack, entry] };
    }
    case 'CAST': {
      // Non-land: goes to the stack to await opponent confirmation
      const card = state.hand.find(c => c.uid === action.uid);
      if (!card) return state;
      return { ...state, hand: state.hand.filter(c => c.uid !== action.uid), stack: [...state.stack, card] };
    }
    case 'STACK_RESOLVE': {
      // Opponent accepted — card resolves
      const card = state.stack.find(c => c.uid === action.uid);
      if (!card) return state;
      const newStack = state.stack.filter(c => c.uid !== action.uid);
      if (card.isSearch) {
        return { ...state, stack: newStack, pendingSearch: true };
      }
      if (resolveToField(card)) {
        return { ...state, stack: newStack, battlefield: [...state.battlefield, { ...card, tapped: false, counters: [], summoningSick: !isLand(card), attacking: false, blocking: false }] };
      }
      return { ...state, stack: newStack, graveyard: [...state.graveyard, card] };
    }
    case 'STACK_COUNTER': {
      // Opponent countered — card goes to graveyard
      const card = state.stack.find(c => c.uid === action.uid);
      if (!card) return state;
      return { ...state, stack: state.stack.filter(c => c.uid !== action.uid), graveyard: [...state.graveyard, card] };
    }
    case 'STACK_CANCEL': {
      // Caster cancels before opponent responds — returns to hand
      const card = state.stack.find(c => c.uid === action.uid);
      if (!card) return state;
      return { ...state, stack: state.stack.filter(c => c.uid !== action.uid), hand: [...state.hand, card] };
    }
    case 'CLEAR_SEARCH':
      return { ...state, pendingSearch: false };
    case 'REVEAL_HAND':
      return { ...state, revealHand: true };
    case 'HIDE_HAND':
      return { ...state, revealHand: false };
    case 'TAP':
      return { ...state, battlefield: state.battlefield.map(c => c.uid === action.uid ? { ...c, tapped: !c.tapped } : c) };
    case 'UNTAP_ALL':
      return { ...state, battlefield: state.battlefield.map(c => ({ ...c, tapped: false, summoningSick: false, attacking: false, blocking: false })) };
    case 'TOGGLE_ATTACK':
      return { ...state, battlefield: state.battlefield.map(c => c.uid === action.uid ? { ...c, attacking: !c.attacking, tapped: !c.attacking } : c) };
    case 'TOGGLE_BLOCK':
      return { ...state, battlefield: state.battlefield.map(c => c.uid === action.uid ? { ...c, blocking: !c.blocking } : c) };
    case 'MOVE': {
      const zones = ['battlefield', 'hand', 'graveyard', 'exile', 'stack'];
      const src = zones.find(z => state[z].some(c => c.uid === action.uid));
      if (!src) return state;
      const card = state[src].find(c => c.uid === action.uid);
      const clean = { ...card, tapped: false, counters: [], summoningSick: true, attacking: false, blocking: false };
      const next = { ...state, [src]: state[src].filter(c => c.uid !== action.uid) };
      if (action.to === 'library_top')    return { ...next, library: [clean, ...state.library] };
      if (action.to === 'library_bottom') return { ...next, library: [...state.library, clean] };
      return { ...next, [action.to]: [...next[action.to], action.to === 'battlefield' ? { ...clean, summoningSick: true } : clean] };
    }
    case 'ADD_COUNTER':
      return { ...state, battlefield: state.battlefield.map(c => {
        if (c.uid !== action.uid) return c;
        const ex = c.counters.find(ct => ct.type === action.ct);
        return { ...c, counters: ex ? c.counters.map(ct => ct.type === action.ct ? { ...ct, n: ct.n + 1 } : ct) : [...c.counters, { type: action.ct, n: 1 }] };
      })};
    case 'REMOVE_COUNTER':
      return { ...state, battlefield: state.battlefield.map(c => {
        if (c.uid !== action.uid) return c;
        return { ...c, counters: c.counters.map(ct => ct.type === action.ct ? { ...ct, n: ct.n - 1 } : ct).filter(ct => ct.n > 0) };
      })};
    case 'CHANGE_LIFE':   return { ...state, life: state.life + action.d };
    case 'CHANGE_POISON': return { ...state, poison: Math.max(0, state.poison + action.d) };
    case 'SHUFFLE':       return { ...state, library: shuffle([...state.library]) };
    case 'MULLIGAN': {
      const all = shuffle([...state.hand, ...state.library]);
      const n = Math.max(0, state.hand.length - 1);
      return { ...state, library: all.slice(n), hand: all.slice(0, n) };
    }
    // Mill: top N cards → graveyard
    case 'MILL': {
      const n = Math.min(action.n, state.library.length);
      return { ...state, library: state.library.slice(n), graveyard: [...state.graveyard, ...state.library.slice(0, n)] };
    }
    // Scry: reorder top N (action.keep=[uids top], action.bottom=[uids bottom])
    case 'SCRY': {
      const top = action.top.map(id => state.library.find(c => c.uid === id)).filter(Boolean);
      const bot = action.bottom.map(id => state.library.find(c => c.uid === id)).filter(Boolean);
      const rest = state.library.slice(action.top.length + action.bottom.length);
      return { ...state, library: [...top, ...rest, ...bot] };
    }
    // Tutor: move specific library card to destination
    case 'TUTOR': {
      const card = state.library.find(c => c.uid === action.uid);
      if (!card) return state;
      const lib = state.library.filter(c => c.uid !== action.uid);
      if (action.to === 'hand') return { ...state, library: action.shuffle ? shuffle(lib) : lib, hand: [...state.hand, card] };
      if (action.to === 'battlefield') return { ...state, library: action.shuffle ? shuffle(lib) : lib, battlefield: [...state.battlefield, { ...card, tapped: false, counters: [], summoningSick: !isLand(card), attacking: false, blocking: false }] };
      return { ...state, library: action.shuffle ? shuffle(lib) : lib };
    }
    // Add a token to battlefield
    case 'ADD_TOKEN': {
      const token = { uid: uid(), name: action.name, typeLine: action.typeLine || '', img: '', manaCost: '', isToken: true, tapped: false, counters: action.counters || [], summoningSick: false, attacking: false, blocking: false };
      return { ...state, battlefield: [...state.battlefield, token] };
    }
    default: return state;
  }
}

/* State shared with opponent (hides hand unless revealHand=true) */
function pub(s) {
  return {
    life: s.life, poison: s.poison, handCount: s.hand.length,
    battlefield: s.battlefield, graveyard: s.graveyard, exile: s.exile,
    libraryCount: s.library.length, phase: s.phase, turnNumber: s.turnNumber, isMyTurn: s.isMyTurn,
    stack: s.stack,
    revealHand: s.revealHand,
    hand: s.revealHand ? s.hand : undefined, // solo se comparte si el jugador decide mostrarla
  };
}

/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const PHASES = [
  { id:'untap',  lbl:'Desgirar' }, { id:'upkeep', lbl:'Mantenimiento' },
  { id:'draw',   lbl:'Robar'    }, { id:'main1',  lbl:'Principal 1'   },

];

const CTRS = ['+1/+1','-1/-1','fiel','carga','veneno','maná','tiempo','+0/+1','+1/+0'];

/* ═══════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════ */

/* Context Menu */
function CtxMenu({ menu, onClose }) {
  const ref = useRef();
  useEffect(() => {
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', fn, true);
    document.addEventListener('touchstart', fn, true);
    return () => { document.removeEventListener('mousedown', fn, true); document.removeEventListener('touchstart', fn, true); };
  }, [onClose]);
  if (!menu) return null;
  const left = Math.min(menu.x, window.innerWidth  - 180);
  const top  = Math.min(menu.y, window.innerHeight - 60);
  return (
    <div ref={ref} className="ctx" style={{ left, top }} onContextMenu={e => e.preventDefault()}>
      {menu.items.map((it, i) => {
        if (it.type === 'sep')   return <div key={i} className="ctx-sep" />;
        if (it.type === 'label') return <div key={i} className="ctx-label">{it.text}</div>;
        return (
          <div key={i} className={`ctx-item${it.danger ? ' danger' : ''}`} onClick={() => { it.fn(); onClose(); }}>
            {it.icon && <span style={{ fontSize: 13 }}>{it.icon}</span>}
            <span>{it.text}</span>
          </div>
        );
      })}
    </div>
  );
}

    </>
  );
}

/* ── Library Modal (Buscar / Scry / Mill / Investigate) ── */

    { id:'investigate', lbl:'🔎 Investigar' },

  /* Search / Tutor */
  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    return q ? library.filter(c => c.name.toLowerCase().includes(q)) : library;
  }, [library, search]);

  const doTutor = (card, to, doShuffle) => {

    const topUids = scryCards.filter(c => scryDest[c.uid] === 'top').map(c => c.uid);
    const botUids = scryCards.filter(c => scryDest[c.uid] === 'bottom').map(c => c.uid);
    onDispatch({ type:'SCRY', top: topUids, bottom: botUids });
    onLog(`hace scry ${scryN} (${topUids.length} arriba, ${botUids.length} abajo)`);
    onClose();
  };

  /* Mill */
  const doMill = () => {
    const n = Math.min(millN, library.length);
    onDispatch({ type:'MILL', n });
    onLog(`hace mill ${n}`);
    onClose();
  };

  /* Investigate */
  const doInvestigate = () => {
    onDispatch({ type:'ADD_TOKEN', name:'Pista', typeLine:'Artifact — Clue', counters:[] });
    onLog('investiga — ficha Pista al campo');
    onClose();
  };

  return (
    <>
      <div className="modal-bg" onClick={onClose}>
        <div className="lib-modal-box" onClick={e => e.stopPropagation()}>

          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 16px 0' }}>
            <span style={{ fontFamily:"'Cinzel Decorative',serif", fontSize:13 }}>📚 Biblioteca ({library.length})</span>
            <button className="act-btn" onClick={onClose}>✕</button>
          </div>
          {/* Tabs */}
          <div className="lib-tabs">
            {TABS.map(t => <button key={t.id} className={`lib-tab${tab===t.id?' active':''}`} onClick={() => { setTab(t.id); setScryCards(null); setTutorCard(null); }}>{t.lbl}</button>)}
          </div>

          {/* ── BUSCAR ── */}
          {tab === 'buscar' && (
            <div className="lib-body">
              {conn ? (
                /* Modo 1v1: búsqueda requiere aprobación del oponente */
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:18, paddingTop:24 }}>
                  <div style={{ fontSize:40 }}>🔍</div>
                  <div style={{ textAlign:'center' }}>
                    <div style={{ fontWeight:700, fontSize:15, marginBottom:6 }}>Buscar en biblioteca</div>
                    <div style={{ fontSize:12, color:'var(--text2)', lineHeight:1.6 }}>
                      Envía la acción al stack.<br/>
                      El oponente debe <strong>Resolver</strong> para que puedas buscar.
                    </div>
                  </div>
                  <button className="btn btn-primary" style={{ fontSize:14, padding:'10px 24px' }} onClick={requestSearch}>
                    🔍 Solicitar búsqueda
                  </button>

              ) : (
                /* Modo solitario: búsqueda directa */
                <>
                  <input className="lib-search" placeholder="Buscar carta por nombre…" value={search} onChange={e => setSearch(e.target.value)} autoFocus />
                  <div style={{ fontSize:11, color:'var(--text2)', opacity:.6 }}>
                    {filtered.length} carta{filtered.length !== 1 ? 's' : ''} · Clic = ver · doble clic = tutorear a mano

          )}

          {/* ── SCRY ── */}
          {tab === 'scry' && (
            <div className="lib-body">
              {!scryCards ? (
                <>
                  <div style={{ fontSize:13, color:'var(--text2)' }}>Mira las X cartas de arriba y elige cuáles quedan arriba o van al fondo.</div>

/* ── Search Library Modal — aparece cuando pendingSearch=true tras resolución del stack ── */
function SearchLibraryModal({ library, onClose, onDispatch, onLog }) {
  const [search, setSearch] = useState('');
  const [selectedCard, setSelectedCard] = useState(null);

  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    return q ? library.filter(c => c.name.toLowerCase().includes(q)) : library;

  const doTutor = (card, to, doShuffle) => {
    onDispatch({ type: 'TUTOR', uid: card.uid, to, shuffle: doShuffle });
    onDispatch({ type: 'CLEAR_SEARCH' });
    onLog(`tutoreó ${card.name} → ${to === 'hand' ? 'mano' : 'campo'}${doShuffle ? ' (baraja)' : ''}`);
    onClose();

  return (
    <>
      <div className="modal-bg" onClick={onClose}>

            <div style={{ fontSize:11, color:'var(--text2)', opacity:.6 }}>
              {filtered.length} carta{filtered.length !== 1 ? 's' : ''} — clic para seleccionar

                <div key={c.uid} className="lib-card-item"

            <button className="btn btn-secondary" onClick={() => doTutor(selectedCard, 'battlefield', true)}>⚡ Search &amp; Play — al campo (baraja)</button>
            <button className="btn btn-secondary" onClick={() => doTutor(selectedCard, 'battlefield', false)}>⚡ Search &amp; Play — al campo (sin barajar)</button>
            <button className="btn btn-danger"    onClick={() => setSelectedCard(null)}>✕ Cancelar</button>
          </div>
        </div>
      )}

  );

/* Card Zoom Overlay — clic en bg o ESC para cerrar */
function CardZoom({ card, onClose, onTap, onCtx }) {
  useEffect(() => {
    const fn = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', fn);
    return () => document.removeEventListener('keydown', fn);
  }, [onClose]);
  return (
    <div className="card-zoom-bg" onClick={onClose}>
      {card.img
        ? <img className="card-zoom-img" src={card.img} alt={card.name} onClick={onClose} />
        : <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:16, padding:28, minWidth:200, textAlign:'center', cursor:'default' }} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight:700, fontSize:16, marginBottom:6 }}>{card.name}</div>
            <div style={{ fontSize:12, color:'var(--text2)' }}>{card.typeLine}</div>
            {card.manaCost && <div style={{ fontSize:12, color:'var(--accent)', marginTop:6 }}>{card.manaCost}</div>}
          </div>
      }
      {card.name && <div className="card-zoom-name">{card.name}</div>}
      {(onTap || onCtx) && (
        <div className="card-zoom-actions" onClick={e => e.stopPropagation()}>
          {onTap && (
            <button onClick={() => { onTap(card.uid); onClose(); }}>
              {card.tapped ? '↩️ Desgirar' : '↪️ Girar'}
            </button>
          )}
          {onCtx && (
            <button onClick={e => { const rect = e.target.getBoundingClientRect(); onCtx({ clientX: rect.left - 170, clientY: rect.top }, card); onClose(); }}>
              ⚙️ Opciones
            </button>
          )}
        </div>
      )}
      <div className="card-zoom-hint">ESC o clic para cerrar</div>
    </div>
  );
}

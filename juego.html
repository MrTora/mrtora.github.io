/* Battlefield Card
   • Clic simple     → zoom (ver carta grande)
   • Doble clic      → girar/desgirar (solo mis cartas)
   • Clic derecho    → menú de opciones (solo mis cartas)
*/
function BfCard({ card, onZoom, onTap, onCtx, readOnly }) {
  const clickTimer = useRef(null);
  const cls = ['bf-card', card.tapped ? 'tapped' : '', card.attacking ? 'attacking' : '', card.blocking ? 'blocking' : '', (card.summoningSick && !isLand(card)) ? 'sickness' : ''].filter(Boolean).join(' ');

  const handleClick = e => {
    e.preventDefault();
    if (clickTimer.current) {
      // double click → tap
      clearTimeout(clickTimer.current);
      clickTimer.current = null;
      if (!readOnly && onTap) onTap(card.uid);
    } else {
      // delay single click to detect double
      clickTimer.current = setTimeout(() => {
        clickTimer.current = null;
        onZoom && onZoom(card);
      }, 220);
    }
  };

  return (
    <div className={cls}
      onClick={handleClick}
      onContextMenu={e => { e.preventDefault(); !readOnly && onCtx && onCtx(e, card); }}
    >
      {card.img ? <img src={card.img} alt={card.name} /> : <div className="no-img">{card.name}</div>}
      {card.counters && card.counters.length > 0 && (
        <div className="ctrs">{card.counters.map(ct => <span key={ct.type} className="ctr-badge">{ct.type}×{ct.n}</span>)}</div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   GAME SCREEN
═══════════════════════════════════════════════ */
function GameScreen({ conn, isHost, myDeckName, oppDeckName, initialCards, onExit }) {
  const [state, dispatch] = useReducer(reducer, INIT);
  const [oppState, setOppState]   = useState(null);
  const [connected, setConnected] = useState(conn ? conn.open !== false : false);
  const [ctx, setCtx]             = useState(null);
  const [modal, setModal]         = useState(null);
  const [log, setLog]             = useState([]);
  const [lifeEdit, setLifeEdit]   = useState(false);
  const [lifeVal, setLifeVal]     = useState('');
  const [zoom, setZoom]           = useState(null); // card object to show big
  const [libModal, setLibModal]   = useState(false);
  const inited = useRef(false);

  /* Init deck */
  useEffect(() => {
    if (initialCards && !inited.current) {
      inited.current = true;
      dispatch({ type: 'INIT_DECK', cards: initialCards });
    }
  }, [initialCards]);

  /* First turn */
  useEffect(() => {
    if (isHost) { dispatch({ type: 'SET_TURN', n: 1, mine: true  }); addLog('🎲 Turno 1 — juegas primero', 'sys'); }
    else         { dispatch({ type: 'SET_TURN', n: 1, mine: false }); addLog('⏳ Turno 1 — espera tu turno', 'sys'); }
  }, [isHost]);

  /* Sync state to peer */
  useEffect(() => {
    if (!conn || !inited.current) return;
    try { if (conn.open) conn.send({ type: 'STATE', state: pub(state) }); } catch {}
  }, [state, conn]);

  /* Incoming messages */
  useEffect(() => {
    if (!conn) return;
    const onData = d => {
      if (d.type === 'STATE')      setOppState(d.state);
      if (d.type === 'LOG')        addLog(`🔵 ${d.msg}`, 'opp');
      if (d.type === 'PASS_TURN') { dispatch({ type: 'SET_TURN', n: d.n, mine: true }); addLog(`⚔️ Turno ${d.n} — tu turno`, 'sys'); }
      // Opponent responded to my spell
      if (d.type === 'STACK_OK') {
        dispatch({ type: 'STACK_RESOLVE', uid: d.uid });
        addLog(`✅ ${d.name} resuelve`, 'sys');
      }
      if (d.type === 'STACK_COUNTER_MSG') {
        dispatch({ type: 'STACK_COUNTER', uid: d.uid });
        addLog(`🛡️ ${d.name} fue respondido`, 'sys');
      }
    };
    const onClose = () => { setConnected(false); addLog('⚠️ Oponente desconectado', 'sys'); };
    conn.on('data',  onData);
    conn.on('close', onClose);
    conn.on('error', onClose);
    if (conn.open) setConnected(true);
    return () => { try { conn.off('data', onData); conn.off('close', onClose); conn.off('error', onClose); } catch {} };
  }, [conn]);

  /* ── Helpers ── */
  const addLog = (msg, type = 'mine') => setLog(prev => [...prev.slice(-30), { msg, type, id: uid() }]);

  const sendLog = msg => {
    addLog(msg, 'mine');
    if (conn && conn.open) try { conn.send({ type: 'LOG', msg }); } catch {}
  };

  const act = (action, logMsg) => { dispatch(action); if (logMsg) sendLog(logMsg); };

  const draw    = () => { if (!state.library.length) { addLog('📚 Biblioteca vacía', 'sys'); return; } act({ type: 'DRAW' }, 'robó una carta'); };
  const untapAll = () => act({ type: 'UNTAP_ALL' }, 'desgira todos sus permanentes');

  /* Play a card from hand:
     - Lands → directly to battlefield (no stack)
     - Everything else → stack, await opponent confirmation */
  const playCard = (id) => {
    const card = state.hand.find(c => c.uid === id);
    if (!card) return;
    if (isLand(card)) {
      act({ type: 'PLAY', uid: id }, `juega ${card.name} (tierra)`);
    } else {
      act({ type: 'CAST', uid: id }, `lanza ${card.name}`);
    }
  };

  /* My stack: opponent accepts → resolve */
  const resolveStack = (uid, name) => {
    act({ type: 'STACK_RESOLVE', uid }, `${name} resuelve`);
  };
  /* My stack: cancel cast → back to hand */
  const cancelCast = (uid, name) => {
    dispatch({ type: 'STACK_CANCEL', uid });
    addLog(`↩ ${name} devuelta a la mano`, 'sys');
  };
  /* My stack: self-counter (solitario) */
  const selfCounter = (uid, name) => {
    act({ type: 'STACK_COUNTER', uid }, `${name} fue respondido`);
  };

  /* Opponent's stack actions (I respond) */
  const acceptOppSpell = (uid, name) => {
    if (conn && conn.open) try { conn.send({ type: 'STACK_OK', uid, name }); } catch {}
    addLog(`✅ Acepta ${name}`, 'mine');
    sendLog(`acepta ${name}`);
  };
  const counterOppSpell = (uid, name) => {
    if (conn && conn.open) try { conn.send({ type: 'STACK_COUNTER_MSG', uid, name }); } catch {}
    addLog(`⚡ Responde a ${name}`, 'mine');
    sendLog(`responde a${name}`);
  };

  const tapCard = (id) => {
    const cur = state.battlefield.find(c => c.uid === id);
    act({ type: 'TAP', uid: id }, cur?.tapped ? `desgira ${cur?.name}` : `gira ${cur?.name}`);
  };

  const move = (id, to, name) => {
    const Z = { graveyard:'cementerio', exile:'exilio', hand:'mano', battlefield:'campo', library_top:'top biblioteca', library_bottom:'fondo biblioteca' };
    act({ type: 'MOVE', uid: id, to }, `${name} → ${Z[to]||to}`);
  };

  const changeLife = d => act({ type: 'CHANGE_LIFE', d }, `${d > 0 ? 'gana' : 'pierde'} ${Math.abs(d)} vida`);

  const passTurn = () => {
    const n = state.turnNumber + 1;
    dispatch({ type: 'SET_TURN', n, mine: false });
    dispatch({ type: 'SET_PHASE', phase: 'untap' });
    if (conn && conn.open) try { conn.send({ type: 'PASS_TURN', n }); } catch {}
    sendLog(`pasa el turno → T${n}`);
  };

  /* ── Context menu builders ── */
  const midCtx = { x: window.innerWidth / 2 - 80, y: window.innerHeight / 2 };

  const bfCtx = (e, card) => {
    const cur = state.battlefield.find(c => c.uid === card.uid) || card;
    const counterItems = CTRS.map(ct => ({ icon: '＋', text: ct, fn: () => { act({ type:'ADD_COUNTER', uid:card.uid, ct }, `+${ct} a ${card.name}`); } }));
    const rmItems = cur.counters?.length ? [
      { type:'sep' }, { type:'label', text:'Quitar contador' },
      ...cur.counters.map(ct => ({ icon:'－', text:`${ct.type} (${ct.n})`, fn:()=>{ act({type:'REMOVE_COUNTER',uid:card.uid,ct:ct.type},`-${ct.type} de ${card.name}`); }})),
    ] : [];
    setCtx({ x: e.clientX, y: e.clientY, items: [
      { type:'label', text: card.name },
      { icon: cur.tapped ? '↩️':'↪️', text: cur.tapped ? 'Desgirar':'Girar', fn: () => tapCard(card.uid) },
      { icon:'🔍', text:'Ver carta (zoom)',  fn:()=>setZoom(cur) },
      { type:'sep' },
      { icon:'⚔️', text: cur.attacking?'Quitar ataque':'Declarar atacante', fn:()=>{ act({type:'TOGGLE_ATTACK',uid:card.uid}, `${card.name} ${cur.attacking?'retira':'declara'} ataque`); }},
      { icon:'🛡️', text: cur.blocking?'Quitar bloqueo':'Declarar bloqueador', fn:()=>{ act({type:'TOGGLE_BLOCK',uid:card.uid}, `${card.name} ${cur.blocking?'retira':'declara'} bloqueo`); }},
      { type:'sep' }, { type:'label', text:'Agregar contador' },
      ...counterItems, ...rmItems,
      { type:'sep' },
      { icon:'✋', text:'A la mano',          fn:()=>move(card.uid,'hand',card.name) },
      { icon:'💀', text:'Al cementerio',       fn:()=>move(card.uid,'graveyard',card.name) },
      { icon:'🌌', text:'Al exilio',           fn:()=>move(card.uid,'exile',card.name) },
      { icon:'📚', text:'Top de biblioteca',   fn:()=>move(card.uid,'library_top',card.name) },
      { icon:'📚', text:'Fondo de biblioteca', fn:()=>move(card.uid,'library_bottom',card.name) },
    ]});
  };

  const handCtx = (e, card) => {
    setCtx({ x: e.clientX, y: e.clientY, items: [
      { type:'label', text: card.name },
      { icon:'🔍', text:'Ver carta (zoom)',   fn:()=>setZoom(card) },
      { type:'sep' },
      { icon:'▶️', text: isLand(card) ? 'Jugar tierra' : 'Lanzar hechizo', fn:()=>playCard(card.uid) },
      { icon:'💀', text:'Descartar',          fn:()=>move(card.uid,'graveyard',card.name) },
      { icon:'🌌', text:'Exiliar',            fn:()=>move(card.uid,'exile',card.name) },
      { icon:'📚', text:'Top de biblioteca',  fn:()=>move(card.uid,'library_top',card.name) },
    ]});
  };

  const zoneCtxItems = card => [
    { type:'label', text: card.name },
    { icon:'✋', text:'A la mano',   fn:()=>move(card.uid,'hand',card.name) },
    { icon:'⚡', text:'Al campo',    fn:()=>move(card.uid,'battlefield',card.name) },
    { icon:'🌌', text:'Al exilio',   fn:()=>move(card.uid,'exile',card.name) },
    { icon:'📚', text:'Top biblio',  fn:()=>move(card.uid,'library_top',card.name) },
  ];

  /* ── Split battlefield ── */
  const spells  = state.battlefield.filter(c => !isLand(c));
  const lands   = state.battlefield.filter(c =>  isLand(c));
  const oppSp   = (oppState?.battlefield||[]).filter(c => !isLand(c));
  const oppLand = (oppState?.battlefield||[]).filter(c =>  isLand(c));

  const curPhase = PHASES.find(p => p.id === state.phase);

  return (
    <div className="game-root" onContextMenu={e => e.preventDefault()}>

      {/* ── HEADER ── */}
      <div className="game-header">
        <span className="gh-logo">⚔ Mesa</span>
        <div className="gh-sep" />
        <div className={`conn-dot ${!conn ? 'off' : connected ? 'on' : 'off'}`} />
        <span className="gh-pill">{!conn ? 'Solitario' : connected ? (oppState ? `vs ${oppDeckName||'Oponente'}` : 'Esperando…') : 'Desconectado'}</span>
        <div className="gh-sep" />
        <span className="gh-pill" style={{ color: 'var(--accent)' }}>T{state.turnNumber}</span>
        <span className="gh-pill">{curPhase?.lbl || state.phase}</span>
        <button className="act-btn" style={{ marginLeft: 'auto', fontSize: 11 }} onClick={onExit}>✕ Salir</button>
      </div>

      {/* ── OPPONENT ZONE ── */}
      <div className="opp-zone">
        <div className="opp-label">{oppDeckName || 'Oponente'}</div>

        <div className="info-bar">
          <span className="life-val" style={{ fontSize: 17, color: (oppState?.life ?? 20) <= 5 ? 'var(--red)' : 'var(--green)' }}>
            ❤️ {oppState?.life ?? '—'}
          </span>
          {oppState?.poison > 0 && <span className="zone-pill">☠ {oppState.poison}</span>}
          <div className="gh-sep" />
          <span className="zone-pill" onClick={() => setModal({ title:'💀 Cementerio rival', cards: oppState?.graveyard ?? [], readOnly: true })}>
            💀 {oppState?.graveyard?.length ?? 0}
          </span>
          <span className="zone-pill" onClick={() => setModal({ title:'🌌 Exilio rival', cards: oppState?.exile ?? [], readOnly: true })}>
            🌌 {oppState?.exile?.length ?? 0}
          </span>
          <span className="zone-pill">📚 {oppState?.libraryCount ?? 0}</span>
          <span className="zone-pill">✋ {oppState?.handCount ?? 0}</span>
        </div>

        <div className="bf-wrap" style={{ flex: 1 }}>
          <ZoneCol
            libraryCount={oppState?.libraryCount ?? 0}
            graveyard={oppState?.graveyard ?? []}
            onLibClick={() => {}}
            onGyClick={() => oppState?.graveyard?.length && setModal({ title:'💀 Cementerio rival', cards: oppState.graveyard, readOnly: true })}
            readOnly
          />
          <div className="bf">
            {oppSp.length === 0 && oppLand.length === 0 && <div className="empty-hint">Campo del oponente</div>}
            {oppSp.map(c => <BfCard key={c.uid} card={c} onZoom={setZoom} readOnly />)}
          </div>
          <div className="bf lands">
            <div className="bf-label">Tierras</div>
            {oppLand.map(c => <BfCard key={c.uid} card={c} onZoom={setZoom} readOnly />)}
          </div>
        </div>

        <div className="opp-hand">
          {oppState?.revealHand && oppState?.hand?.length > 0
            ? <>
                <span style={{ fontSize:9, color:'#f87171', fontWeight:700, alignSelf:'center', marginRight:4, whiteSpace:'nowrap' }}>
                  👁 Mano revelada
                </span>
                {oppState.hand.map(card => (
                  <div key={card.uid} className="hand-card" style={{ cursor:'default' }} onClick={() => setZoom(card)}>
                    {card.img
                      ? <img src={card.img} alt={card.name} onError={e => { e.target.style.display='none'; }} />
                      : <div className="no-img">{card.name}</div>
                    }
                  </div>
                ))}
              </>
            : <>
                {Array.from({ length: oppState?.handCount ?? 0 }).map((_, i) => <div key={i} className="face-down" />)}
                {!oppState && <span style={{ fontSize: 10, color: 'var(--text2)', opacity: .45 }}>Sin conexión</span>}
              </>
          }
        </div>
      </div>

      {/* ── STACK ZONE ── */}
      {(state.stack.length > 0 || (oppState?.stack?.length ?? 0) > 0) && (() => {
        const myStack  = state.stack;
        const oppStack = oppState?.stack ?? [];
        const hasOppPending = oppStack.length > 0;
        return (
          <div className={`stack-zone${hasOppPending ? ' active' : ''}`}>
            <div className="stack-header">⚡ Pila de hechizos</div>

            {/* Mis cartas lanzadas — esperando respuesta del rival */}
            {myStack.map(c => (
              <div key={c.uid} className={`stack-entry${c.isSearch ? ' search-entry' : ''}`}>
                {c.isSearch
                  ? <span style={{ fontSize:20 }}>🔍</span>
                  : c.img && <img className="stack-img" src={c.img} alt={c.name} onError={e => e.target.style.display='none'} />
                }
                <div style={{ flex:1, minWidth:0 }}>
                  <div className="stack-name">{c.name}</div>
                  <div className="stack-type">{c.typeLine}</div>
                </div>
                <span className="stack-who mine">Yo</span>
                <div className="stack-acts">
                  {/* Solitario: resolver/contrahechizar tú mismo */}
                  {!conn && <>
                    <button className="stack-btn accept" onClick={() => resolveStack(c.uid, c.name)}>✅ Resolver</button>
                    {!c.isSearch && <button className="stack-btn counter" onClick={() => selfCounter(c.uid, c.name)}>⚡ Responder</button>}
                  </>}
                  {/* Conectado: solo cancelar */}
                  {conn && <span style={{ fontSize:10, color:'var(--text2)', fontStyle:'italic' }}>Esperando…</span>}
                  <button className="stack-btn cancel" onClick={() => cancelCast(c.uid, c.name)}>↩ Cancelar</button>
                </div>
              </div>
            ))}

            {/* Cartas del rival — yo debo responder */}
            {oppStack.map(c => (
              <div key={c.uid} className={`stack-entry opp-entry${c.isSearch ? ' search-entry' : ''}`}>
                {c.isSearch
                  ? <span style={{ fontSize:20 }}>🔍</span>
                  : c.img && <img className="stack-img" src={c.img} alt={c.name} onError={e => e.target.style.display='none'} />
                }
                <div style={{ flex:1, minWidth:0 }}>
                  <div className="stack-name">{c.name}</div>
                  <div className="stack-type">{c.typeLine}</div>
                </div>
                <span className="stack-who opp">{oppDeckName || 'Rival'}</span>
                <div className="stack-acts">
                  <button className="stack-btn accept" onClick={() => acceptOppSpell(c.uid, c.name)}>✅ Resolver</button>
                  {!c.isSearch && <button className="stack-btn counter" onClick={() => counterOppSpell(c.uid, c.name)}>⚡ Responder</button>}
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* ── PHASE BAR ── */}
      <div className="phase-bar">
        {PHASES.map((ph, i) => (
          <React.Fragment key={ph.id}>
            {i > 0 && <div className="ph-sep" />}
            <button className={`ph-btn${state.phase === ph.id ? ' active' : ''}`}
              onClick={() => { dispatch({ type:'SET_PHASE', phase: ph.id }); sendLog(`→ ${ph.lbl}`); }}>
              {ph.lbl}
            </button>
          </React.Fragment>
        ))}
        <div className="gh-sep" style={{ margin: '0 6px' }} />
        <span className={`turn-pill ${state.isMyTurn ? 'turn-mine' : 'turn-theirs'}`}>
          {state.isMyTurn ? '⚔️ Tu turno' : '⏳ Turno rival'}
        </span>
      </div>

      {/* ── PLAYER ZONE ── */}
      <div className="player-zone">

        {/* Battlefield */}
        <div className="bf-wrap" style={{ flex: 1, minHeight: 0 }}>
          <ZoneCol
            library={state.library}
            graveyard={state.graveyard}
            onLibClick={() => setLibModal(true)}
            onGyClick={() => setModal({
              title: '💀 Mi cementerio', cards: state.graveyard, readOnly: false,
              onAction: c => { setModal(null); setCtx({ ...midCtx, items: zoneCtxItems(c) }); }
            })}
          />
          <div className="bf">
            <div className="bf-label">Mi campo · clic = ver carta · clic derecho = opciones · doble clic = girar</div>
            {spells.length === 0 && <div className="empty-hint">Clic en carta de mano = jugar · clic derecho = opciones</div>}
            {spells.map(c => <BfCard key={c.uid} card={c} onZoom={setZoom} onTap={tapCard} onCtx={bfCtx} />)}
          </div>
          <div className="bf lands">
            <div className="bf-label">Tierras</div>
            {lands.map(c => <BfCard key={c.uid} card={c} onZoom={setZoom} onTap={tapCard} onCtx={bfCtx} />)}
          </div>
        </div>

        {/* Hand */}
        <div className="hand-bar">
          {state.hand.length === 0
            ? <div style={{ fontSize: 11, color: 'var(--text2)', opacity: .45, alignSelf: 'center', padding: '0 8px' }}>
                {state.library.length > 0 ? '— Mano vacía · Robar —' : '— Biblioteca vacía —'}
              </div>
            : state.hand.map(card => (
              <div key={card.uid} className="hand-card"
                onClick={() => playCard(card.uid)}
                onContextMenu={e => handCtx(e, card)}>
                {card.img
                  ? <img src={card.img} alt={card.name} onError={e => { e.target.style.display = 'none'; }} />
                  : <div className="no-img">{card.name}</div>
                }
              </div>
            ))
          }
          {/* Botón revelar mano — solo en 1v1 */}
          {conn && (
            <button
              onClick={() => act({ type: state.revealHand ? 'HIDE_HAND' : 'REVEAL_HAND' }, state.revealHand ? 'oculta su mano' : 'muestra su mano al rival')}
              title={state.revealHand ? 'Ocultar mano al rival' : 'Mostrar mano al rival'}
              style={{
                alignSelf: 'center', flexShrink: 0, marginLeft: 6,
                fontSize: 11, padding: '4px 8px', borderRadius: 6,
                background: state.revealHand ? 'rgba(248,113,113,.18)' : 'var(--surface2)',
                border: `1px solid ${state.revealHand ? 'rgba(248,113,113,.6)' : 'var(--border)'}`,
                color: state.revealHand ? '#f87171' : 'var(--text2)', cursor: 'pointer',
              }}
            >
              {state.revealHand ? '🙈 Ocultar mano' : '👁 Mostrar mano'}
            </button>
          )}
        </div>

        {/* Info bar (life + zones) */}
        <div className="info-bar bottom">
          <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
            <button className="life-btn" onClick={() => changeLife(-1)}>−</button>
            {lifeEdit
              ? <input className="input-field" autoFocus style={{ width: 50, textAlign: 'center', padding: '1px 3px', fontSize: 17, fontWeight: 800 }}
                  value={lifeVal} onChange={e => setLifeVal(e.target.value)}
                  onBlur={() => { const v = parseInt(lifeVal); if (!isNaN(v)) { act({ type:'CHANGE_LIFE', d: v - state.life }, `vida → ${v}`); } setLifeEdit(false); }}
                  onKeyDown={e => e.key === 'Enter' && e.target.blur()} />
              : <span className={`life-val${state.life <= 5 ? ' low' : ''}`} onClick={() => { setLifeVal(String(state.life)); setLifeEdit(true); }}>{state.life}</span>
            }
            <button className="life-btn" onClick={() => changeLife(+1)}>＋</button>
          </div>
          {state.poison > 0 && <span className="zone-pill" style={{ cursor:'pointer' }} onClick={() => act({ type:'CHANGE_POISON', d:-1 }, 'pierde contador veneno')}>☠ {state.poison}</span>}
          <div className="gh-sep" />
          <span className="zone-pill" onClick={() => setModal({
            title: '💀 Mi cementerio', cards: state.graveyard, readOnly: false,
            onAction: c => { setModal(null); setCtx({ ...midCtx, items: zoneCtxItems(c) }); }
          })}>💀 {state.graveyard.length}</span>
          <span className="zone-pill" onClick={() => setModal({
            title: '🌌 Mi exilio', cards: state.exile, readOnly: false,
            onAction: c => { setModal(null); setCtx({ ...midCtx, items: [
              { type:'label', text:c.name },
              { icon:'✋', text:'A la mano', fn:()=>move(c.uid,'hand',c.name) },
              { icon:'⚡', text:'Al campo',  fn:()=>move(c.uid,'battlefield',c.name) },
            ]}); }
          })}>🌌 {state.exile.length}</span>
          <span className="zone-pill" onClick={() => setLibModal(true)}>
            📚 {state.library.length}
          </span>
          <span className="zone-pill" style={{ opacity:.7 }} onClick={() => act({ type:'SHUFFLE' }, 'baraja su biblioteca')} title="Barajar">
            🔀
          </span>
        </div>

        {/* Action bar */}
        <div className="action-bar">
          <button className="act-btn hl" onClick={draw} disabled={!state.library.length}>📥 Robar</button>
          <button className="act-btn"    onClick={untapAll}>↺ Desgirar todo</button>
          {state.hand.length === 0 && state.library.length >= 7 && (
            <button className="act-btn" style={{ borderColor:'var(--accent)', color:'var(--accent)' }}
              onClick={() => act({ type:'DRAW_N', n:7 }, 'toma mano inicial (7)')}>
              🤚 Mano inicial
            </button>
          )}
          {state.hand.length > 0 && state.library.length > 0 && (
            <button className="act-btn" onClick={() => act({ type:'MULLIGAN' }, `mulligan → ${Math.max(0, state.hand.length-1)} cartas`)}>
              🔄 Mulligan ({Math.max(0, state.hand.length - 1)})
            </button>
          )}
          <button className="act-btn" onClick={() => act({ type:'CHANGE_POISON', d:1 }, 'recibe contador de veneno')}>☠ +Veneno</button>
          <button className={`act-btn${state.isMyTurn ? ' go' : ''}`} onClick={passTurn} disabled={!state.isMyTurn}>
            ⏭ Pasar turno
          </button>
        </div>

        {/* Log */}
        <div className="log-panel">
          {log.slice(-12).reverse().map(e => <div key={e.id} className={`log-line ${e.type}`}>{e.msg}</div>)}
        </div>
      </div>

      {/* Overlays */}
      {ctx      && <CtxMenu menu={ctx} onClose={() => setCtx(null)} />}
      {modal    && <ZoneModal title={modal.title} cards={modal.cards} readOnly={modal.readOnly} onAction={modal.onAction} onClose={() => setModal(null)} />}
      {libModal && <LibraryModal library={state.library} graveyard={state.graveyard} onClose={() => setLibModal(false)} onDispatch={dispatch} onLog={sendLog} conn={conn} />}
      {state.pendingSearch && (
        <SearchLibraryModal
          library={state.library}
          onClose={() => dispatch({ type: 'CLEAR_SEARCH' })}
          onDispatch={dispatch}
          onLog={sendLog}
        />
      )}
      {zoom  && (
        <CardZoom
          card={zoom}
          onClose={() => setZoom(null)}
          onTap={!zoom._readOnly && state.battlefield.some(c => c.uid === zoom.uid) ? tapCard : null}
          onCtx={!zoom._readOnly && state.battlefield.some(c => c.uid === zoom.uid) ? (e, c) => { bfCtx(e, c); } : null}
        />
      )}
      {conn && !connected && (
        <div className="disc-overlay">
          <span style={{ fontSize: 38 }}>⚠️</span>
          <span style={{ fontSize: 16, fontWeight: 700 }}>Oponente desconectado</span>
          <div style={{ display:'flex', gap:10 }}>
            <button className="btn btn-secondary" onClick={() => setConnected('solo')}>Continuar solo</button>
            <button className="btn btn-danger"    onClick={onExit}>Salir</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   LOADING SCREEN
═══════════════════════════════════════════════ */
function LoadingScreen({ deck, onReady, onBack }) {
  const [prog, setProg] = useState({ done: 0, total: 1 });
  const [error, setError] = useState('');

  useEffect(() => {
    let cancelled = false;
    expandDeck(deck.entries, (done, total) => { if (!cancelled) setProg({ done, total }); })
      .then(cards => { if (!cancelled) onReady(cards); })
      .catch(() => { if (!cancelled) setError('Error cargando cartas. Reintenta.'); });
    return () => { cancelled = true; };
  }, []);

  const pct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
  return (
    <div className="screen-center">
      <div className="logo">⚔ Kaza's Grimoire</div>
      <div className="card-panel">
        <div className="panel-title">Cargando {deck.name}…</div>
        <div className="progress-bar"><div className="progress-fill" style={{ width: `${pct}%` }} /></div>
        <div style={{ fontSize: 12, color: 'var(--text2)', textAlign: 'center' }}>{prog.done} / {prog.total} cartas · {pct}%</div>
        {error && <div style={{ color: 'var(--red)', fontSize: 12 }}>{error}</div>}
        <button className="btn btn-secondary" onClick={onBack}>← Cancelar</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   DECK SELECT SCREEN
═══════════════════════════════════════════════ */
function DeckSelect({ conn, isHost, onStart, onBack }) {
  const [decks]    = useState(() => { try { return JSON.parse(localStorage.getItem('mtg_decks') || '[]'); } catch { return []; } });
  const [sel, setSel] = useState(null);
  const [myReady, setMyReady]   = useState(false);
  const [oppInfo, setOppInfo]   = useState(null);
  const [oppReady, setOppReady] = useState(false);
  const [dbgLog, setDbgLog]     = useState([]);
  const myReadyRef  = useRef(false);
  const oppReadyRef = useRef(false);
  const selRef      = useRef(null);

  const dbg = msg => setDbgLog(l => [...l.slice(-6), `${new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} ${msg}`]);

  useEffect(() => { myReadyRef.current  = myReady;  }, [myReady]);
  useEffect(() => { oppReadyRef.current = oppReady; }, [oppReady]);
  useEffect(() => { selRef.current      = sel;      }, [sel]);

  const sendSafe = useCallback(msg => {
    if (!conn) { dbg('✗ send: sin conn'); return; }
    const open = conn.open;
    try { conn.send(msg); dbg(`→ enviado (open=${open}): ${msg.type}`); }
    catch(e) { dbg(`✗ send error: ${e.message}`); }
  }, [conn]);

  useEffect(() => {
    if (!conn) return;
    dbg(`conn registrada open=${conn.open}`);
    const fn = d => {
      dbg(`← recibido: ${d.type}`);
      if (d.type === 'DECK_READY')   { setOppInfo({ name: d.name, format: d.format }); setOppReady(true); }
      if (d.type === 'DECK_UNREADY') { setOppInfo(null); setOppReady(false); }
    };
    conn.on('data', fn);
    return () => conn.off('data', fn);
  }, [conn]);

  // Reenviar DECK_READY cada 1.5s mientras myReady=true y oppReady=false
  useEffect(() => {
    if (!conn || !myReady || oppReady) return;
    const s = selRef.current;
    if (!s) return;
    const iv = setInterval(() => {
      if (oppReadyRef.current) { clearInterval(iv); return; }
      sendSafe({ type:'DECK_READY', name:s.name, format:s.format||'' });
    }, 1500);
    return () => clearInterval(iv);
  }, [conn, myReady, oppReady, sendSafe]);

  useEffect(() => {
    if (myReady && (oppReady || !conn) && sel) {
      dbg('▶ onStart!');
      onStart(sel, oppInfo?.name || 'Solitario');
    }
  }, [myReady, oppReady, sel, conn, oppInfo, onStart]);

  const ready = () => {
    if (!sel) return;
    setMyReady(true);
    dbg(`listo con: ${sel.name}`);
    sendSafe({ type:'DECK_READY', name:sel.name, format:sel.format||'' });
    if (!conn) onStart(sel, 'Solitario');
  };
  const unready = () => { setMyReady(false); sendSafe({ type:'DECK_UNREADY' }); };

  const fmtWarn = oppInfo && sel?.format && oppInfo.format && sel.format !== oppInfo.format;

  return (
    <div className="screen-center">
      <div className="logo">⚔ Kaza's Grimoire</div>
      <div className="card-panel" style={{ maxWidth: 520 }}>
        <div className="panel-title">Elige tu mazo</div>

        {decks.length === 0
          ? <div style={{ color:'var(--text2)', fontSize:13, textAlign:'center', padding:16 }}>
              No hay mazos. Importa uno en la colección primero.
              <br/><a href="coleccion.html" style={{ color:'var(--accent2)' }}>← Ir a colección</a>
            </div>
          : <div style={{ display:'flex', flexDirection:'column', gap:8, maxHeight:320, overflowY:'auto' }}>
              {decks.map(d => (
                <div key={d.id} className={`deck-item${sel?.id === d.id ? ' selected':''}`}
                  onClick={() => !myReady && setSel(d)}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:14 }}>{d.name}</div>
                    <div style={{ fontSize:11, color:'var(--text2)', marginTop:2 }}>
                      {d.entries.reduce((s,e)=>s+e.qty,0)} cartas · {d.entries.length} distintas
                    </div>
                  </div>
                  {d.format && <span className="format-badge">{d.format}</span>}
                </div>
              ))}
            </div>
        }

        {fmtWarn && (
          <div style={{ background:'rgba(248,113,113,.1)', border:'1px solid rgba(248,113,113,.38)', borderRadius:8, padding:'7px 12px', fontSize:12, color:'var(--red)' }}>
            ⚠️ Formatos distintos: tú ({sel.format}) vs rival ({oppInfo.format})
          </div>
        )}

        {conn && (
          <div style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:8, padding:'9px 13px', fontSize:12, display:'flex', alignItems:'center', gap:8 }}>
            <div className={`conn-dot ${oppReady ? 'on' : 'wait'}`} />
            {oppReady
              ? <span style={{ color:'var(--green)' }}>Rival listo: {oppInfo?.name}{oppInfo?.format ? ` (${oppInfo.format})`:''}</span>
              : <span style={{ color:'var(--text2)' }}>Esperando que el rival elija mazo…</span>
            }
          </div>
        )}

        <div style={{ display:'flex', gap:8 }}>
          <button className="btn btn-secondary" onClick={onBack}>← Volver</button>
          {myReady
            ? <button className="btn btn-secondary" style={{ flex:1 }} onClick={unready}>Cancelar listo</button>
            : <button className="btn btn-primary"   style={{ flex:1 }} disabled={!sel} onClick={ready}>
                {conn ? '¡Listo! ✔' : '▶ Jugar solo'}
              </button>
          }
        </div>
        {myReady && conn && <div style={{ textAlign:'center', fontSize:12, color:'var(--text2)' }}>Esperando rival…</div>}

        {/* ── DEBUG PANEL ── */}
        {conn && dbgLog.length > 0 && (
          <div style={{
            background:'#0d1117', border:'1px solid #30363d', borderRadius:8,
            padding:'8px 10px', fontSize:10, fontFamily:'monospace',
            color:'#8b949e', maxHeight:120, overflowY:'auto',
          }}>
            <div style={{color:'#58a6ff', fontWeight:700, marginBottom:4}}>
              🔌 Debug · open={String(conn.open)} · yo={isHost?'HOST':'JOIN'} · myReady={String(myReady)} · oppReady={String(oppReady)}
            </div>
            {dbgLog.map((l,i) => <div key={i}>{l}</div>)}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   LOBBY SCREEN
═══════════════════════════════════════════════ */
function Lobby({ onConnected, onSolo }) {
  const [mode, setMode]         = useState(null); // null | 'host' | 'joining' | 'join'
  const [code, setCode]         = useState('');
  const [joinCode, setJoinCode] = useState('');
  const [status, setStatus]     = useState('');
  const [error, setError]       = useState('');
  const [copied, setCopied]     = useState(false);
  const ablyRef   = useRef(null);
  const cancelRef = useRef(false);

  useEffect(() => () => {
    cancelRef.current = true;
    if (ablyRef.current) try { ablyRef.current.close(); } catch {}
  }, []);

  /* ── HOST ── */
  const createGame = () => {
    setError(''); cancelRef.current = false;
    const roomCode = Math.random().toString(36).slice(2, 8).toUpperCase();
    setCode(roomCode); setMode('host'); setStatus('Registrando sala…');

    const ably = new Ably.Realtime({ key: ABLY_KEY });
    ablyRef.current = ably;
    const channel = ably.channels.get(`kazagame-${roomCode}`);

    ably.connection.once('connected', async () => {
      if (cancelRef.current) return;
      try { await channel.presence.enter({ role: 'host' }); } catch {}
      if (!cancelRef.current) setStatus('Sala lista — comparte el código');

      channel.subscribe('join', async () => {
        if (cancelRef.current) return;
        try { await channel.publish('confirm', { ok: true }); } catch {}
        setStatus('¡Conectado!');
        const conn = makeConn(channel, 'host');
        ablyRef.current = null;
        setTimeout(() => onConnected(conn, true), 400);
      });
    });

    ably.connection.on('failed', () => {
      if (!cancelRef.current) setError('Error al conectar con Ably.');
    });
  };

  /* ── JOIN ── */
  const startJoin = () => {
    if (!joinCode.trim()) return;
    setError(''); cancelRef.current = false;
    setMode('join'); setStatus('Buscando sala…');
    const roomCode = joinCode.trim().toUpperCase();

    const ably = new Ably.Realtime({ key: ABLY_KEY });
    ablyRef.current = ably;
    const channel = ably.channels.get(`kazagame-${roomCode}`);

    let confirmed = false;
    let joinIv = null;

    const giveUp = setTimeout(() => {
      if (confirmed || cancelRef.current) return;
      if (joinIv) clearInterval(joinIv);
      setError('No se encontró la sala. ¿El anfitrión ya la creó?');
      setMode('joining');
    }, 30000);

    ably.connection.once('connected', async () => {
      if (cancelRef.current) { clearTimeout(giveUp); return; }
      try { await channel.presence.enter({ role: 'joiner' }); } catch {}

      channel.subscribe('confirm', () => {
        if (confirmed || cancelRef.current) return;
        confirmed = true;
        if (joinIv) clearInterval(joinIv);
        clearTimeout(giveUp);
        setStatus('¡Conectado!');
        const conn = makeConn(channel, 'joiner');
        ablyRef.current = null;
        setTimeout(() => onConnected(conn, false), 400);
      });

      // Publica join y reintenta cada 2s hasta recibir confirm
      const tryJoin = () => {
        if (confirmed || cancelRef.current) return;
        channel.publish('join', { from: 'joiner' }).catch(() => {});
      };
      tryJoin();
      joinIv = setInterval(() => {
        if (confirmed || cancelRef.current) { clearInterval(joinIv); return; }
        tryJoin();
      }, 2000);
    });

    ably.connection.on('failed', () => {
      if (!cancelRef.current) { clearTimeout(giveUp); setError('Error al conectar con Ably.'); }
    });
  };

  const cancel = () => {
    cancelRef.current = true;
    if (ablyRef.current) try { ablyRef.current.close(); } catch {}
    ablyRef.current = null;
    setMode(null); setCode(''); setError('');
    cancelRef.current = false;
  };

  const copyCode = () => { navigator.clipboard?.writeText(code).catch(()=>{}); setCopied(true); setTimeout(() => setCopied(false), 2000); };

  /* ── RENDER ── */
  if (!mode) return (
    <div className="screen-center">
      <div className="logo">⚔ Kaza's Grimoire</div>
      <div style={{ fontFamily:"'Cinzel Decorative',serif", fontSize:12, color:'var(--text2)', marginTop:-14 }}>Mesa de Juego</div>
      <div className="card-panel">
        <div className="panel-title">¿Cómo quieres jugar?</div>
        <button className="btn btn-primary"   style={{ fontSize:15, padding:14 }} onClick={createGame}>🏠 Crear partida</button>
        <button className="btn btn-secondary" style={{ fontSize:15, padding:14 }} onClick={() => { setError(''); setMode('joining'); }}>🔗 Unirse a partida</button>
        <div style={{ height:1, background:'var(--border)' }} />
        <button className="btn btn-secondary" style={{ opacity:.7 }} onClick={onSolo}>🧙 Modo solitario</button>
        <a href="coleccion.html" style={{ textAlign:'center', fontSize:12, color:'var(--text2)', textDecoration:'none' }}>← Volver a colección</a>
      </div>
    </div>
  );

  if (mode === 'joining') return (
    <div className="screen-center">
      <div className="logo">⚔ Kaza's Grimoire</div>
      <div className="card-panel">
        <div className="panel-title">Unirse a partida</div>
        <input className="input-field" placeholder="Código de sala (6 caracteres)" value={joinCode}
          onChange={e => setJoinCode(e.target.value.toUpperCase())} maxLength={6}
          onKeyDown={e => e.key === 'Enter' && startJoin()}
          autoFocus
          style={{ fontSize:26, textAlign:'center', letterSpacing:10, fontFamily:'monospace', fontWeight:800 }} />
        {error && (
          <div style={{ background:'rgba(248,113,113,.1)', border:'1px solid rgba(248,113,113,.3)', borderRadius:8, padding:'8px 12px', fontSize:12, color:'var(--red)' }}>
            ⚠️ {error}
          </div>
        )}
        <button className="btn btn-primary" onClick={startJoin} disabled={joinCode.length < 4}>Conectar →</button>
        <button className="btn btn-secondary" onClick={cancel}>← Volver</button>
      </div>
    </div>
  );

  if (mode === 'join') return (
    <div className="screen-center">
      <div className="logo">⚔ Kaza's Grimoire</div>
      <div className="card-panel">
        <div className="panel-title" style={{ textAlign:'center' }}>Conectando a sala <span style={{ color:'var(--accent)', fontFamily:'monospace', letterSpacing:4 }}>{joinCode}</span></div>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, padding:'8px 0' }}>
          <div className="spinner" style={{ width:36, height:36 }} />
          <span style={{ color:'var(--text2)', fontSize:13 }}>{status}</span>
          <div style={{ fontSize:11, color:'var(--text2)', textAlign:'center', opacity:.6, lineHeight:1.5 }}>
            El anfitrión debe tener la sala abierta.<br/>Conectando vía Ably…
          </div>
        </div>
        <button className="btn btn-secondary" onClick={cancel}>← Cancelar</button>
      </div>
    </div>
  );

  /* Host mode */
  return (
    <div className="screen-center">
      <div className="logo">⚔ Kaza's Grimoire</div>
      <div className="card-panel">
        <div className="panel-title">Comparte este código con tu rival</div>
        <div className="code-display" style={{ cursor:'pointer' }} onClick={copyCode} title="Clic para copiar">
          {code}
        </div>
        <button className="btn btn-secondary" style={{ fontSize:12 }} onClick={copyCode}>
          {copied ? '✅ Copiado!' : '📋 Copiar código'}
        </button>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10 }}>
          <div className="spinner" />
          <span style={{ color:'var(--text2)', fontSize:13 }}>{status}</span>
        </div>
        <div style={{ fontSize:11, color:'var(--text2)', textAlign:'center', opacity:.6, lineHeight:1.5 }}>
          Espera a que tu rival ingrese el código.<br/>Ambos deben estar en esta página al mismo tiempo.
        </div>
        {error && <div style={{ color:'var(--red)', fontSize:12 }}>{error}</div>}
        <button className="btn btn-secondary" onClick={cancel}>← Cancelar</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('lobby'); // 'lobby'|'deck-select'|'loading'|'game'
  const [conn,   setConn  ] = useState(null);
  const [isHost, setIsHost] = useState(false);
  const [selDeck, setSelDeck] = useState(null);
  const [gameCards, setGameCards] = useState(null);
  const [myName,  setMyName ] = useState('');
  const [oppName, setOppName] = useState('');

  const handleConnected = (c, host) => { setConn(c); setIsHost(host); setScreen('deck-select'); };
  const handleSolo      = () => { setConn(null); setIsHost(true); setScreen('deck-select'); };

  const handleStart = useCallback((deck, opp) => {
    setSelDeck(deck); setMyName(deck.name); setOppName(opp); setScreen('loading');
  }, []);

  const handleReady = cards => { setGameCards(cards); setScreen('game'); };
  const handleExit  = () => { setScreen('lobby'); setConn(null); setGameCards(null); setSelDeck(null); };

  if (screen === 'lobby')       return <Lobby onConnected={handleConnected} onSolo={handleSolo} />;
  if (screen === 'deck-select') return <DeckSelect conn={conn} isHost={isHost} onStart={handleStart} onBack={() => setScreen('lobby')} />;
  if (screen === 'loading')     return <LoadingScreen deck={selDeck} onReady={handleReady} onBack={() => setScreen('deck-select')} />;
  if (screen === 'game')        return <GameScreen conn={conn} isHost={isHost} myDeckName={myName} oppDeckName={oppName} initialCards={gameCards} onExit={handleExit} />;
  return null;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>

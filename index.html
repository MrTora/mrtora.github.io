<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=editor.html" />
  <title>MTG Proxy Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13; color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .hub {
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 32px;
    }
    .logo { font-size: 28px; font-weight: 700; color: #c49a2a; letter-spacing: 1px; }
    .logo span { color: #8888aa; font-weight: 400; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      background: #1a1a24; border: 1px solid #2e2e3e; border-radius: 14px;
      padding: 32px 40px; text-decoration: none; color: inherit;
      transition: all .15s; min-width: 180px;
    }
    .card:hover { border-color: #8b5cf6; background: #23232f; transform: translateY(-3px); }
    .card .icon { font-size: 40px; }
    .card .title { font-size: 16px; font-weight: 700; }
    .card .desc { font-size: 13px; color: #8888aa; }
  </style>
</head>
<body>
  <div class="hub">
    <div class="logo">MTG Proxy <span>Studio</span></div>
    <div class="cards">
      <a href="editor.html" class="card">
        <div class="icon">✏️</div>
        <div class="title">Editor Proxy</div>
        <div class="desc">Diseña cartas personalizadas</div>
      </a>
      <a href="coleccion.html" class="card">
        <div class="icon">📦</div>
        <div class="title">Mi Colección</div>
        <div class="desc">Gestiona tu portafolio</div>
      </a>
    </div>
  </div>
</body>
</html>
